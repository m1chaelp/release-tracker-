async function loadData() {
  try {
    var r = await fetch(SHEETS_API);
    var text = await r.text();
    var parsed = JSON.parse(text);
    if (parsed && parsed.projects && Array.isArray(parsed.projects) && parsed.projects.length > 0) return parsed.projects;
    if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].columns) {
      return [{id:mkId(),name:"Mój Projekt",emoji:"📋",color:"#3B82F6",sheets:parsed}];
    }
    return defaultProjects;
  } catch(e) { return defaultProjects; }
}
async function saveData(projects) {
  try { await fetch(SHEETS_API, {method:"POST",mode:"no-cors",body:JSON.stringify({projects:projects})}); } catch(e) {}
}

// ── PORTAL DROPDOWN HOOK ──────────────────────────────────────────────────────
function usePortalDropdown(triggerRef, open) {
  var initial = {position:"fixed",top:0,left:0,bottom:"auto"};
  var pair = useState(initial);
  var style = pair[0];
  var setStyle = pair[1];
  useEffect(function() {
    if (open && triggerRef.current) {
      var r = triggerRef.current.getBoundingClientRect();
      var spaceBelow = window.innerHeight - r.bottom;
      var goUp = spaceBelow < 300;
      setStyle({
        position:"fixed",
        top: goUp ? "auto" : r.bottom + 6,
        bottom: goUp ? (window.innerHeight - r.top + 6) : "auto",
        left: Math.max(8, Math.min(r.left, window.innerWidth - 320)),
      });
    }
  }, [open]);
  return style;
}

// ── STATUS CELL ──────────────────────────────────────────────────────────────
function StatusCell(props) {
  var value = props.value; var options = props.options; var onChange = props.onChange;
  var pair = useState(false); var open = pair[0]; var setOpen = pair[1];
  var ref = useRef();
  var opts = options || STATUS_OPTS;
  var opt = opts.find(function(o){return o.label===value;}) || opts[0];
  var dropStyle = usePortalDropdown(ref, open);
  useEffect(function() {
    var fn = function(e) {
      var portal = document.getElementById("status-portal");
      if (!(ref.current && ref.current.contains(e.target)) && !(portal && portal.contains(e.target))) setOpen(false);
    };
    if (open) document.addEventListener("mousedown", fn);
    return function() { document.removeEventListener("mousedown", fn); };
  }, [open]);
  return (
    <div ref={ref} style={{userSelect:"none"}}>
      <div onClick={function(){setOpen(function(o){return !o;});}} style={{
        display:"flex",alignItems:"center",gap:7,padding:"5px 11px",
        background:opt.bg,border:"1.5px solid "+opt.border,borderRadius:20,
        cursor:"pointer",justifyContent:"space-between",minWidth:140,
        boxShadow:open?"0 0 0 3px "+opt.dot+"28":"none",transition:"box-shadow .15s"
      }}>
        <span style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:opt.dot,flexShrink:0}}/>
          <span style={{color:opt.color,fontWeight:700,fontSize:12}}>{opt.label}</span>
        </span>
        <span style={{color:opt.color,fontSize:8,opacity:.6,transform:open?"rotate(180deg)":"none",display:"inline-block",transition:"transform .2s"}}>▾</span>
      </div>
      {open && ReactDOM.createPortal(
        <div id="status-portal" style={Object.assign({},dropStyle,{
          zIndex:9999,background:"#fff",borderRadius:14,minWidth:190,
          boxShadow:"0 16px 48px rgba(0,0,0,.2)",border:"1px solid #E2E8F0",overflow:"hidden",
          animation:"popIn .15s cubic-bezier(.34,1.56,.64,1)"
        })}>
          <div style={{padding:"8px 12px 4px",fontSize:10,fontWeight:800,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",borderBottom:"1px solid #F1F5F9"}}>Status</div>
          {opts.map(function(o) {
            return (
              <div key={o.label} onClick={function(){onChange(o.label);setOpen(false);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",cursor:"pointer",
                  background:value===o.label?o.bg:"transparent",
                  borderLeft:"3px solid "+(value===o.label?o.dot:"transparent")}}
                onMouseEnter={function(e){if(value!==o.label)e.currentTarget.style.background="#F8FAFC";}}
                onMouseLeave={function(e){if(value!==o.label)e.currentTarget.style.background="transparent";}}>
                <span style={{width:9,height:9,borderRadius:"50%",background:o.dot,flexShrink:0}}/>
                <span style={{color:o.color,fontWeight:700,fontSize:13}}>{o.label}</span>
                {value===o.label && <span style={{marginLeft:"auto",color:o.dot,fontSize:12,fontWeight:900}}>✓</span>}
              </div>
            );
          })}
        </div>, document.body
      )}
    </div>
  );
}

// ── TEST CELL ─────────────────────────────────────────────────────────────────
function TestCell(props) {
  var value = props.value; var onChange = props.onChange;
  var val = (value && typeof value==="object") ? value : emptyTest();
  var pair = useState(false); var open = pair[0]; var setOpen = pair[1];
  var ref = useRef();
  var state = TEST_STATES.find(function(t){return t.key===val.state;}) || TEST_STATES[0];
  var dropStyle = usePortalDropdown(ref, open);
  useEffect(function() {
    var fn = function(e) {
      var portal = document.getElementById("test-portal");
      if (!(ref.current && ref.current.contains(e.target)) && !(portal && portal.contains(e.target))) setOpen(false);
    };
    if (open) document.addEventListener("mousedown", fn);
    return function() { document.removeEventListener("mousedown", fn); };
  }, [open]);
  return (
    <div ref={ref} style={{userSelect:"none"}}>
      <div onClick={function(){setOpen(function(o){return !o;});}} style={{
        display:"flex",alignItems:"center",gap:6,padding:"5px 12px",
        background:state.bg,border:"1.5px solid "+state.border,
        borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",
        boxShadow:open?"0 0 0 3px "+state.dot+"28":"none",transition:"box-shadow .15s"
      }}>
        <span style={{fontSize:13,fontWeight:900,color:state.dot}}>{state.icon}</span>
        <span style={{color:state.color,fontWeight:700,fontSize:12}}>{state.label}</span>
        <span style={{color:state.color,fontSize:8,opacity:.6,transform:open?"rotate(180deg)":"none",display:"inline-block",transition:"transform .2s"}}>▾</span>
      </div>
      {open && ReactDOM.createPortal(
        <div id="test-portal" style={Object.assign({},dropStyle,{
          zIndex:9999,background:"#fff",borderRadius:16,minWidth:240,
          boxShadow:"0 20px 60px rgba(0,0,0,.2)",border:"1px solid #E2E8F0",overflow:"hidden",
          animation:"popIn .15s cubic-bezier(.34,1.56,.64,1)"
        })}>
          <div style={{padding:"10px 14px 6px",fontSize:10,fontWeight:800,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",borderBottom:"1px solid #F1F5F9"}}>🧪 Status testów</div>
          <div style={{padding:6}}>
          {TEST_STATES.map(function(t) {
            return (
              <div key={t.key} onClick={function(){onChange(Object.assign({},val,{state:t.key}));setOpen(false);}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"9px 12px",borderRadius:10,cursor:"pointer",
                  background:val.state===t.key?t.bg:"transparent",
                  border:"1.5px solid "+(val.state===t.key?t.border:"transparent"),marginBottom:2}}
                onMouseEnter={function(e){if(val.state!==t.key){e.currentTarget.style.background="#F8FAFC";e.currentTarget.style.borderColor="#E2E8F0";}}}
                onMouseLeave={function(e){if(val.state!==t.key){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";}}}>
                <span style={{width:34,height:34,borderRadius:10,background:t.bg,border:"2px solid "+t.border,
                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:15,color:t.dot,fontWeight:900}}>{t.icon}</span>
                <div>
                  <div style={{color:t.color,fontWeight:800,fontSize:13}}>{t.label}</div>
                  <div style={{color:t.dot,fontSize:10,opacity:.7,marginTop:1}}>
                    {t.key==="pass"?"Zakończone sukcesem":t.key==="fail"?"Wykryto błędy":t.key==="running"?"Testy w toku":t.key==="skipped"?"Pominięto":"Jeszcze nie testowano"}
                  </div>
                </div>
                {val.state===t.key && <span style={{marginLeft:"auto",width:22,height:22,borderRadius:"50%",background:t.dot,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:900,flexShrink:0}}>✓</span>}
              </div>
            );
          })}
          </div>
        </div>, document.body
      )}
    </div>
  );
}

// ── COMMENT CELL ──────────────────────────────────────────────────────────────
function CommentCell(props) {
  var value = props.value; var onChange = props.onChange;
  var pair = useState(false); var open = pair[0]; var setOpen = pair[1];
  var p2 = useState(value); var draft = p2[0]; var setDraft = p2[1];
  var p3 = useState({top:0,left:0}); var pos = p3[0]; var setPos = p3[1];
  var btnRef = useRef(); var taRef = useRef();
  var openPanel = function() {
    setDraft(value);
    if (btnRef.current) {
      var r = btnRef.current.getBoundingClientRect();
      var spaceBelow = window.innerHeight - r.bottom;
      setPos({
        top: spaceBelow > 280 ? r.bottom + 6 : r.top - 308,
        left: Math.max(8, Math.min(r.left, window.innerWidth - 330)),
      });
    }
    setOpen(true);
    setTimeout(function(){if(taRef.current)taRef.current.focus();}, 50);
  };
  var save = function(){onChange(draft);setOpen(false);};
  var cancel = function(){setDraft(value);setOpen(false);};
  useEffect(function() {
    var fn = function(e) {
      var portal = document.getElementById("comment-portal");
      if (!(btnRef.current && btnRef.current.contains(e.target)) && !(portal && portal.contains(e.target))) {
        onChange(draft); setOpen(false);
      }
    };
    if (open) document.addEventListener("mousedown", fn);
    return function() { document.removeEventListener("mousedown", fn); };
  }, [open, draft]);
  var isEmpty = !value || value.trim()==="";
  return (
    <div style={{userSelect:"none",minWidth:150}}>
      <div ref={btnRef} onClick={openPanel} style={{
        display:"flex",alignItems:"center",gap:6,padding:"5px 10px",
        borderRadius:8,cursor:"pointer",transition:"all .15s",
        border:"1.5px solid "+(open?"#3B82F6":isEmpty?"#E2E8F0":"#CBD5E1"),
        background:open?"#EFF6FF":isEmpty?"#F8FAFC":"#fff",minHeight:32,maxWidth:210
      }}
        onMouseEnter={function(e){if(!open){e.currentTarget.style.borderColor="#3B82F6";e.currentTarget.style.background="#F0F9FF";}}}
        onMouseLeave={function(e){if(!open){e.currentTarget.style.borderColor=isEmpty?"#E2E8F0":"#CBD5E1";e.currentTarget.style.background=isEmpty?"#F8FAFC":"#fff";}}}>
        <span style={{fontSize:11,flexShrink:0}}>💬</span>
        {isEmpty
          ? <span style={{color:"#CBD5E1",fontSize:12,fontStyle:"italic"}}>Dodaj komentarz…</span>
          : <span style={{color:"#374151",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150,display:"block"}}>{value}</span>
        }
        <span style={{marginLeft:"auto",fontSize:10,color:"#94A3B8",flexShrink:0}}>✏️</span>
      </div>
      {open && ReactDOM.createPortal(
        <div id="comment-portal" style={{
          position:"fixed",top:pos.top,left:pos.left,zIndex:9999,
          background:"#fff",borderRadius:16,width:320,
          boxShadow:"0 20px 60px rgba(0,0,0,.22)",border:"1px solid #E2E8F0",overflow:"hidden",
          animation:"popIn .15s cubic-bezier(.34,1.56,.64,1)"
        }}>
          <div style={{padding:"12px 16px 10px",background:"linear-gradient(135deg,#F8FAFC,#F1F5F9)",borderBottom:"1px solid #E2E8F0",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>💬</span>
            <span style={{fontSize:13,fontWeight:800,color:"#1E293B"}}>Komentarz</span>
            {draft && <span style={{marginLeft:"auto",fontSize:10,color:"#94A3B8",background:"#E2E8F0",padding:"1px 8px",borderRadius:20}}>{draft.length} zn.</span>}

}

// ── URL CELL ──────────────────────────────────────────────────────────────────
function UrlCell(props) {
  var value = props.value; var onChange = props.onChange;
  var val = (value && typeof value==="object") ? value : {label:"",url:""};
  var pair = useState(false); var open = pair[0]; var setOpen = pair[1];
  var p2 = useState(val.label); var dLabel = p2[0]; var setDLabel = p2[1];
  var p3 = useState(val.url); var dUrl = p3[0]; var setDUrl = p3[1];
  var p4 = useState({top:0,left:0}); var pos = p4[0]; var setPos = p4[1];
  var btnRef = useRef();
  var openPanel = function() {
    setDLabel(val.label); setDUrl(val.url);
    if (btnRef.current) {
      var r = btnRef.current.getBoundingClientRect();
      setPos({top:r.bottom+6,left:Math.max(8,Math.min(r.left,window.innerWidth-330))});
    }
    setOpen(true);
  };
  var save = function(){onChange({label:dLabel,url:dUrl});setOpen(false);};
  useEffect(function() {
    var fn = function(e) {
      var portal = document.getElementById("url-portal");
      if (!(btnRef.current && btnRef.current.contains(e.target)) && !(portal && portal.contains(e.target))) setOpen(false);
    };
    if (open) document.addEventListener("mousedown", fn);
    return function() { document.removeEventListener("mousedown", fn); };
  }, [open]);
  var isEmpty = !val.url;
  return (
    <div style={{userSelect:"none",minWidth:150}}>
      <div ref={btnRef} style={{display:"flex",alignItems:"center",gap:6}}>
        {!isEmpty
          ? <a href={val.url} target="_blank" rel="noopener noreferrer"
              style={{color:"#3B82F6",fontSize:12,fontWeight:600,textDecoration:"none",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>
              🔗 {val.label || val.url}
            </a>
          : <span style={{color:"#CBD5E1",fontSize:12,fontStyle:"italic"}}>+ Dodaj link…</span>
        }
        <button onClick={openPanel} style={{border:"none",background:"none",cursor:"pointer",color:"#94A3B8",fontSize:11,padding:"2px 4px",borderRadius:4,flexShrink:0}}
          onMouseEnter={function(e){e.currentTarget.style.color="#3B82F6";}} onMouseLeave={function(e){e.currentTarget.style.color="#94A3B8";}}>✏️</button>
      </div>
      {open && ReactDOM.createPortal(
        <div id="url-portal" style={{
          position:"fixed",top:pos.top,left:pos.left,zIndex:9999,
          background:"#fff",borderRadius:16,width:320,
          boxShadow:"0 20px 60px rgba(0,0,0,.2)",border:"1px solid #E2E8F0",
          animation:"popIn .15s cubic-bezier(.34,1.56,.64,1)"
        }}>
          <div style={{padding:"12px 16px 10px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🔗</span>
            <span style={{fontSize:13,fontWeight:800,color:"#1E293B"}}>Dodaj link</span>
            <button onClick={function(){setOpen(false);}} style={{marginLeft:"auto",border:"none",background:"none",cursor:"pointer",color:"#94A3B8",fontSize:16}}>✕</button>
          </div>
          <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:5}}>Etykieta</label>
              <input value={dLabel} onChange={function(e){setDLabel(e.target.value);}} placeholder="np. PROJ-101, Figma…"
                style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 12px",fontSize:13,fontFamily:"inherit"}}
                onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:5}}>URL</label>
              <input value={dUrl} onChange={function(e){setDUrl(e.target.value);}} placeholder="https://…"
                style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 12px",fontSize:13,fontFamily:"inherit"}}
                onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}
                onKeyDown={function(e){if(e.key==="Enter")save();}}/>
            </div>
          </div>
          <div style={{padding:"0 16px 14px",display:"flex",gap:8,justifyContent:"flex-end"}}>
            {val.url && <button onClick={function(){onChange({label:"",url:""});setOpen(false);}} style={{border:"none",background:"transparent",color:"#EF4444",fontSize:12,cursor:"pointer",padding:"7px 10px",borderRadius:8,fontFamily:"inherit",fontWeight:600}}>🗑</button>}
            <button onClick={function(){setOpen(false);}} style={{border:"1.5px solid #E2E8F0",background:"transparent",color:"#64748B",fontSize:12,cursor:"pointer",padding:"7px 14px",borderRadius:8,fontFamily:"inherit",fontWeight:600}}>Anuluj</button>
            <button onClick={save} style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",fontSize:12,cursor:"pointer",padding:"7px 18px",borderRadius:8,fontFamily:"inherit",fontWeight:700}}>💾 Zapisz</button>
          </div>

// ── AI SMART PASTE MODAL ──────────────────────────────────────────────────────
function SmartPasteModal(props) {
  var columns = props.columns; var onImport = props.onImport; var onClose = props.onClose;
  var p1 = useState(""); var text = p1[0]; var setText = p1[1];
  var p2 = useState(null); var preview = p2[0]; var setPreview = p2[1];
  var p3 = useState(false); var loading = p3[0]; var setLoading = p3[1];
  var p4 = useState(""); var error = p4[0]; var setError = p4[1];
  var p5 = useState("manual"); var mode = p5[0]; var setMode = p5[1];
  var fileRef = useRef();

  var textCols = columns.filter(function(c){return c.type==="text";});
  var colNames = textCols.map(function(c){return c.name;}).join(", ");

  var analyzeWithAI = async function() {
    if (!text.trim()) return;
    setLoading(true); setError(""); setPreview(null);
    try {
      var prompt = "Masz tekst z listą funkcjonalności/zadań do zaimportowania do trackera. Kolumny w tabeli: "+colNames+".\n\nZParsuj poniższy tekst i zwróć JSON array obiektów gdzie klucze to nazwy kolumn. Każdy obiekt = jeden wiersz. Pierwsze pole to nazwa/tytuł, drugie pole to opis jeśli istnieje.\n\nOdpowiedz TYLKO czystym JSON bez żadnego markdown ani backticks.\n\nTEKST DO PARSOWANIA:\n"+text;
      var response = await fetch(ANTHROPIC_API, {
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{role:"user",content:prompt}]
        })
      });
      var data = await response.json();
      var rawText = data.content && data.content[0] && data.content[0].text ? data.content[0].text : "";
      var clean = rawText.replace(/```json/g,"").replace(/```/g,"").trim();
      var parsed = JSON.parse(clean);
      if (Array.isArray(parsed)) setPreview(parsed);
      else setError("AI nie zwróciło poprawnego formatu — spróbuj jeszcze raz.");
    } catch(e) {
      setError("Błąd AI: "+e.message+". Spróbuj trybu Ręcznego.");
    }
    setLoading(false);
  };

  var parseManual = function() {
    var lines = text.trim().split("\n").filter(function(l){return l.trim();});
    var rows = lines.map(function(line) {
      var clean = line.replace(/^[\s\-\*\•\d\.\)\|]+/,"").trim();
      var parts = clean.split(/\s*[\|\t\-–—]\s*/);
      var obj = {};
      textCols.forEach(function(col,i) { obj[col.name] = parts[i] ? parts[i].trim() : ""; });
      return obj;
    }).filter(function(r) {
      return Object.values(r).some(function(v){return v && v.trim();});
    });
    setPreview(rows);
  };

  var handleFile = function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      setText(e.target.result);
    };
    reader.readAsText(file);
  };

  var doImport = function() {
    if (!preview || !preview.length) return;
    var newRows = preview.map(function(obj) {
      var row = {id:mkId()};
      columns.forEach(function(col) {
        if(col.type==="checkbox") row[col.id]=false;
        else if(col.type==="test") row[col.id]=emptyTest();
        else if(col.type==="url") row[col.id]={label:"",url:""};
        else if(col.type==="status") row[col.id]=(col.options&&col.options[1]&&col.options[1].label)||"Nie rozpoczęte";
        else row[col.id]="";
      });
      textCols.forEach(function(col) {
        var val = obj[col.name] || obj[col.name.toLowerCase()] || "";
        if (val) row[col.id] = val;
      });
      if (!row[textCols[0] && textCols[0].id]) {
        var keys = Object.keys(obj);
        if (keys.length > 0 && textCols[0]) row[textCols[0].id] = obj[keys[0]] || "";
        if (keys.length > 1 && textCols[1]) row[textCols[1].id] = obj[keys[1]] || "";
      }
      return row;
    });
    onImport(newRows);
  };

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.75)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(5px)"}}
      onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:24,width:680,maxWidth:"calc(100vw - 32px)",maxHeight:"88vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 30px 80px rgba(0,0,0,.35)",animation:"popIn .2s"}}>

        {/* Header */}
        <div style={{padding:"22px 28px 0",background:"linear-gradient(135deg,#0F172A,#1E293B)",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <h3 style={{fontSize:20,fontWeight:900,color:"#fff",margin:0}}>📋 Import danych</h3>
              <div style={{color:"#64748B",fontSize:12,marginTop:4}}>Wklej tekst z ChatGPT, Notepada, Excela lub wgraj plik</div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,.1)",color:"#fff",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16}}>✕</button>
          </div>
          <div style={{display:"flex",gap:2,paddingBottom:0}}>
            {[{id:"ai",icon:"✨",label:"Smart AI Paste"},{id:"manual",icon:"📊",label:"Ręczny / Excel / Plik"}].map(function(tab){
              var isA = mode===tab.id;
              return (
                <div key={tab.id} onClick={function(){setMode(tab.id);setPreview(null);setError("");}}
                  style={{padding:"10px 18px",cursor:"pointer",fontSize:13,fontWeight:700,
                    color:isA?"#fff":"#64748B",
                    background:isA?"rgba(255,255,255,.08)":"transparent",
                    borderRadius:"10px 10px 0 0",
                    borderBottom:isA?"3px solid #60A5FA":"3px solid transparent",
                    display:"flex",alignItems:"center",gap:7,transition:"all .15s"}}>
                  <span>{tab.icon}</span><span>{tab.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>

          {/* ✨ AI MODE */}
          {mode==="ai" && (
            <div>
              <div style={{padding:"12px 16px",background:"linear-gradient(135deg,#EFF6FF,#F0FDF4)",borderRadius:12,border:"1px solid #BFDBFE",marginBottom:16,fontSize:13,color:"#1E3A8A",display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:20,flexShrink:0}}>✨</span>
                <div>
                  <strong>Jak to działa:</strong> Wklej dowolny tekst — listę punktowaną, tabelę, wynik ChatGPT, notatki. AI automatycznie rozpozna strukturę i dopasuje do kolumn: <strong>{colNames}</strong>.
                </div>
              </div>
              <label style={{display:"block",fontSize:11,fontWeight:800,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Wklej tekst tutaj (Ctrl+V)</label>

                rows={9}
                style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:12,padding:"14px",fontSize:13,fontFamily:"inherit",resize:"vertical",lineHeight:1.7,background:"#FAFBFF",color:"#1E293B"}}
                onFocus={function(e){e.currentTarget.style.borderColor="#60A5FA";}}
                onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
              {error && <div style={{padding:"10px 14px",background:"#FEE2E2",borderRadius:10,color:"#991B1B",fontSize:12,marginTop:10,border:"1px solid #FCA5A5"}}>{error}</div>}
              {preview && (
                <div style={{marginTop:16}}>

                  </div>
                  <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0",fontSize:12,maxHeight:200,overflowY:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead>

  );

// ── COLUMN MODAL ──────────────────────────────────────────────────────────────

            onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>

                  border:"2px solid "+(type===t.val?"#0F172A":"#E2E8F0"),transition:"all .15s"
                }}>{t.icon} {t.label}</div>

                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {PALETTE.map(function(p,pi){
                      return <div key={pi} onClick={function(){setStatusOpts(function(opts){return opts.map(function(x,idx){return idx===i?Object.assign({},x,p):x;});});}} style={{width:16,height:16,borderRadius:"50%",background:p.dot,cursor:"pointer",border:o.dot===p.dot?"2.5px solid #0F172A":"2px solid transparent",transform:o.dot===p.dot?"scale(1.25)":"scale(1)",transition:"transform .1s"}}/>;

        </div>

    </div>
  );

// ── SHEET VIEW ────────────────────────────────────────────────────────────────
function SheetView(props) {
  var sheet = props.sheet; var onChange = props.onChange;
  var p1 = useState(null); var colModal = p1[0]; var setColModal = p1[1];
  var p2 = useState(null); var editingHeader = p2[0]; var setEditingHeader = p2[1];
  var p3 = useState(null); var hoveredRow = p3[0]; var setHoveredRow = p3[1];
  var p4 = useState(null); var detailRow = p4[0]; var setDetailRow = p4[1];
  var p5 = useState(""); var search = p5[0]; var setSearch = p5[1];
  var p6 = useState(false); var importModal = p6[0]; var setImportModal = p6[1];

  var updateRow = function(rowId,colId,val){
    onChange(Object.assign({},sheet,{rows:sheet.rows.map(function(r){return r.id===rowId?Object.assign({},r,{[colId]:val}):r;})}));
  };
  var updateFullRow = function(newRow){
    onChange(Object.assign({},sheet,{rows:sheet.rows.map(function(r){return r.id===newRow.id?newRow:r;})}));
  };
  var addRow = function() {
    var row = {id:mkId()};
    sheet.columns.forEach(function(c) {
      if(c.type==="checkbox") row[c.id]=false;
      else if(c.type==="test") row[c.id]=emptyTest();
      else if(c.type==="url") row[c.id]={label:"",url:""};
      else if(c.type==="status") row[c.id]=(c.options&&c.options[1]&&c.options[1].label)||"Nie rozpoczęte";
      else row[c.id]="";
    });
    onChange(Object.assign({},sheet,{rows:[...sheet.rows,row]}));
  };
  var deleteRow = function(id){onChange(Object.assign({},sheet,{rows:sheet.rows.filter(function(r){return r.id!==id;})}));};
  var saveCol = function(col) {
    var def = col.type==="checkbox"?false:col.type==="test"?emptyTest():col.type==="url"?{label:"",url:""}:col.type==="status"?((col.options&&col.options[0]&&col.options[0].label)||""):"";
    if(colModal.isNew) onChange(Object.assign({},sheet,{columns:[...sheet.columns,col],rows:sheet.rows.map(function(r){return Object.assign({},r,{[col.id]:def});})}));
    else onChange(Object.assign({},sheet,{columns:sheet.columns.map(function(c,i){return i===colModal.idx?col:c;})}));
    setColModal(null);
  };
  var deleteCol = function(idx) {
    var col = sheet.columns[idx];
    onChange(Object.assign({},sheet,{columns:sheet.columns.filter(function(_,i){return i!==idx;}),rows:sheet.rows.map(function(r){var nr=Object.assign({},r);delete nr[col.id];return nr;})}));
  };
  var importRows = function(newRows) {
    onChange(Object.assign({},sheet,{rows:[...sheet.rows,...newRows]}));
    setImportModal(false);
  };
  var exportToClipboard = function() {
    var headers = sheet.columns.map(function(c){return c.name;}).join("\t");
    var rows = sheet.rows.map(function(r){
      return sheet.columns.map(function(c){
        var v=r[c.id];
        if(c.type==="test") return (v&&v.state)||"";
        if(c.type==="checkbox") return v?"TAK":"NIE";
        if(c.type==="url") return (v&&v.url)||"";
        return v||"";
      }).join("\t");
    }).join("\n");
    navigator.clipboard.writeText(headers+"\n"+rows).then(function(){
      alert("✅ Skopiowano!\nWklej Ctrl+V w Google Sheets lub Excel.");
    });
  };

  var total = sheet.rows.length;
  var statusCols = sheet.columns.filter(function(c){return c.type==="status";});
  var checkCols = sheet.columns.filter(function(c){return c.type==="checkbox";});
  var testCols = sheet.columns.filter(function(c){return c.type==="test";});
  var donePct = statusCols.length&&total ? Math.round(sheet.rows.filter(function(r){return r[statusCols[0].id]==="Zakończone";}).length/total*100) : null;
  var ts = null;
  if(testCols.length&&total) {
    var counts = {pass:0,fail:0,running:0,skipped:0,untested:0};
    sheet.rows.forEach(function(r){testCols.forEach(function(c){var s=(r[c.id]&&typeof r[c.id]==="object")?r[c.id].state:"untested";counts[s]=(counts[s]||0)+1;});});
    ts = counts;
  }
  var filtered = search.trim() ? sheet.rows.filter(function(r){
    return sheet.columns.some(function(c){
      var v=r[c.id];
      var str=c.type==="test"?(v&&v.state)||"":c.type==="url"?((v&&v.label)||"")+((v&&v.url)||""):String(v||"");
      return str.toLowerCase().includes(search.toLowerCase());
    });
  }) : sheet.rows;

  var H = {padding:"11px 13px",fontWeight:700,fontSize:11,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".07em",background:"#0F172A",borderBottom:"1px solid #1E293B",whiteSpace:"nowrap",textAlign:"left"};
  var C = {padding:"9px 12px",fontSize:13,color:"#334155",borderBottom:"1px solid #F1F5F9",verticalAlign:"middle"};

  return (
    <div>
      {colModal && <ColumnModal col={colModal.col} onSave={saveCol} onClose={function(){setColModal(null);}}/>}
      {detailRow && <RowDetailPanel row={detailRow} columns={sheet.columns} onClose={function(){setDetailRow(null);}} onUpdate={updateFullRow}/>}
      {importModal && <SmartPasteModal columns={sheet.columns} onImport={importRows} onClose={function(){setImportModal(false);}}/>}

      {/* Stats bar */}
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"stretch"}}>
        <div style={{padding:"12px 20px",borderRadius:14,background:"linear-gradient(135deg,#1E293B,#334155)",minWidth:90}}>
          <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-1px"}}>{total}</div>
          <div style={{fontSize:11,color:"#94A3B8",fontWeight:600,marginTop:1}}>Łącznie</div>
        </div>
        {donePct!==null && (
          <div style={{padding:"12px 20px",borderRadius:14,background:"#fff",border:"1px solid #E2E8F0",minWidth:165,display:"flex",flexDirection:"column",justifyContent:"center",gap:7}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em"}}>Postęp</span>
              <span style={{fontSize:16,fontWeight:900,color:"#0F172A"}}>{donePct}%</span>
            </div>
            <ProgressBar value={donePct} color="#10B981"/>
          </div>
        )}
        {ts && (
          <div style={{padding:"12px 18px",borderRadius:14,background:"#fff",border:"1px solid #E2E8F0",display:"flex",flexDirection:"column",gap:8,minWidth:230}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em"}}>🧪 Testy</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[{key:"pass",label:"Przeszły",color:"#065F46",bg:"#D1FAE5",dot:"#10B981"},{key:"fail",label:"Błąd",color:"#991B1B",bg:"#FEE2E2",dot:"#EF4444"},{key:"running",label:"W trakcie",color:"#854D0E",bg:"#FEF9C3",dot:"#EAB308"},{key:"untested",label:"Brak",color:"#475569",bg:"#F1F5F9",dot:"#94A3B8"}].filter(function(s){return ts[s.key]>0;}).map(function(s){
                return (
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,background:s.bg}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:s.dot}}/>
                    <span style={{fontSize:13,fontWeight:800,color:s.color}}>{ts[s.key]}</span>
                    <span style={{fontSize:10,color:s.color,opacity:.75}}>{s.label}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",height:5,borderRadius:99,overflow:"hidden",gap:1}}>
              {ts.pass>0&&<div style={{flex:ts.pass,background:"#10B981"}}/>}
              {ts.fail>0&&<div style={{flex:ts.fail,background:"#EF4444"}}/>}
              {ts.running>0&&<div style={{flex:ts.running,background:"#EAB308"}}/>}
              {ts.untested>0&&<div style={{flex:ts.untested,background:"#E2E8F0"}}/>}
            </div>
          </div>
        )}
        {checkCols.map(function(c){
          var pct=total?Math.round(sheet.rows.filter(function(r){return r[c.id];}).length/total*100):0;
          return (
            <div key={c.id} style={{padding:"12px 20px",borderRadius:14,background:"linear-gradient(135deg,#6B21A8,#7C3AED)"}}>
              <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-1px"}}>{pct}%</div>
              <div style={{fontSize:11,color:"#E9D5FF",fontWeight:600,marginTop:1}}>{c.name}</div>
            </div>
          );
        })}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8",fontSize:14}}>🔍</span>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Szukaj…"
              style={{padding:"8px 12px 8px 32px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:13,fontFamily:"inherit",background:"#fff",color:"#1E293B",width:180}}
              onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>

            style={{border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",padding:"8px 14px",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}
            onMouseEnter={function(e){e.currentTarget.style.borderColor="#6366F1";e.currentTarget.style.color="#4F46E5";e.currentTarget.style.background="#EEF2FF";}}

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",background:"#fff"}}>
            <thead>
              <tr>
                <th style={Object.assign({},H,{width:36,padding:"11px 8px"})}>#</th>
                {sheet.columns.map(function(col,ci){
                  return (

                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:10,opacity:.45}}>{col.type==="status"?"🎯":col.type==="test"?"🧪":col.type==="checkbox"?"☑️":col.type==="url"?"🔗":col.comment?"💬":""}</span>

                          <input autoFocus value={col.name} onBlur={function(){setEditingHeader(null);}} onKeyDown={function(e){if(e.key==="Enter")setEditingHeader(null);}}
                            onChange={function(e){var v=e.target.value;onChange(Object.assign({},sheet,{columns:sheet.columns.map(function(c,i){return i===ci?Object.assign({},c,{name:v}):c;})}));}}
                            style={{border:"1px solid #3B82F6",borderRadius:4,padding:"2px 6px",fontSize:11,fontFamily:"inherit",fontWeight:700,color:"#fff",background:"#1E293B",width:100}}/>

                        <div style={{display:"flex",gap:1,marginLeft:"auto"}}>

                      </div>
                    </th>
                  );
                })}
                <th style={Object.assign({},H,{width:44})}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(function(row,ri){
                return (
                  <tr key={row.id} className="row-hover"
                    onMouseEnter={function(){setHoveredRow(row.id);}} onMouseLeave={function(){setHoveredRow(null);}}
                    style={{background:ri%2===0?"#fff":"#FAFBFF",transition:"background .1s"}}>
                    <td style={Object.assign({},C,{textAlign:"center",padding:"9px 8px"})}>
                      <div className="row-num" onClick={function(){setDetailRow(row);}}
                        style={{width:24,height:24,borderRadius:6,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:11,fontWeight:700,color:"#64748B",margin:"0 auto",opacity:0,transition:"all .15s"}}
                        onMouseEnter={function(e){e.currentTarget.style.background="#EFF6FF";e.currentTarget.style.color="#1D4ED8";}}
                        onMouseLeave={function(e){e.currentTarget.style.background="#F1F5F9";e.currentTarget.style.color="#64748B";}}>
                        {ri+1}
                      </div>
                    </td>
                    {sheet.columns.map(function(col){
                      return (
                        <td key={col.id} style={Object.assign({},C,{textAlign:col.type==="checkbox"?"center":"left"})}>
                          {col.type==="test" ? <TestCell value={row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="status" ? <StatusCell value={row[col.id]} options={col.options} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="checkbox" ? <CheckCell value={!!row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="url" ? <UrlCell value={row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="number" ? <input type="number" value={row[col.id]||""} onChange={function(e){updateRow(row.id,col.id,e.target.value);}} style={{border:"1px solid transparent",padding:"3px 6px",borderRadius:6,width:80,background:"transparent",fontFamily:"inherit",fontSize:13}}/> :
                           col.comment ? <CommentCell value={row[col.id]||""} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           <input type="text" value={row[col.id]||""} onChange={function(e){updateRow(row.id,col.id,e.target.value);}}
                             style={{border:"1px solid transparent",padding:"4px 7px",borderRadius:7,width:"100%",minWidth:60,background:"transparent",fontFamily:"inherit",fontSize:13}}
                             onFocus={function(e){e.currentTarget.style.borderColor="#CBD5E1";}} onBlur={function(e){e.currentTarget.style.borderColor="transparent";}}/>}
                        </td>
                      );
                    })}
                    <td style={Object.assign({},C,{textAlign:"center",opacity:hoveredRow===row.id?1:0,transition:"opacity .15s"})}>
                      <button onClick={function(){deleteRow(row.id);}} style={{border:"none",background:"#FEE2E2",cursor:"pointer",color:"#EF4444",fontSize:11,padding:"4px 7px",borderRadius:6,fontWeight:700}}>✕</button>
                    </td>
                  </tr>
                );
              })}
              {filtered.length===0 && (
                <tr><td colSpan={sheet.columns.length+2} style={{padding:"40px",textAlign:"center",color:"#94A3B8",fontSize:14}}>
                  {search ? "Brak wyników dla: "+search : "Brak wierszy — kliknij „+ Dodaj wiersz""}
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div style={{padding:"12px 16px",background:"#F8FAFC",borderTop:"1px solid #F1F5F9",display:"flex",gap:10,alignItems:"center"}}>
          {[
            {label:"+ Dodaj wiersz",fn:addRow,hBg:"#EFF6FF",hBor:"#3B82F6",hCol:"#1D4ED8"},
            {label:"+ Dodaj kolumnę",fn:function(){setColModal({col:{name:"",type:"text"},isNew:true});},hBg:"#F0FDF4",hBor:"#10B981",hCol:"#065F46"},
          ].map(function(b){
            return (
              <button key={b.label} onClick={b.fn}
                style={{border:"1.5px dashed #CBD5E1",background:"transparent",color:"#94A3B8",padding:"6px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600,transition:"all .15s"}}
                onMouseEnter={function(e){e.currentTarget.style.background=b.hBg;e.currentTarget.style.borderColor=b.hBor;e.currentTarget.style.color=b.hCol;}}
                onMouseLeave={function(e){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="#CBD5E1";e.currentTarget.style.color="#94A3B8";}}>
                {b.label}
              </button>
            );
          })}
          {search && <span style={{marginLeft:"auto",color:"#64748B",fontSize:12}}>Znaleziono: <strong>{filtered.length}</strong> z {total}</span>}
        </div>
      </div>
    </div>
  );
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────────────

  var isEdit = !!(initial && initial.id);
  var p1 = useState(initial&&initial.name?initial.name:""); var name = p1[0]; var setName = p1[1];
  var p2 = useState((initial&&initial.emoji)||"🚀"); var emoji = p2[0]; var setEmoji = p2[1];
  var p3 = useState((initial&&initial.color)||"#3B82F6"); var color = p3[0]; var setColor = p3[1];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.7)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}

          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Nazwa projektu</label>
          <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="np. E-commerce, HC PROD, CRM…"

        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Emoji projektu</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

            })}
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Kolor akcentu</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {PROJECT_COLORS.map(function(c){
              return <div key={c} onClick={function(){setColor(c);}} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:"3px solid "+(color===c?"#0F172A":"transparent"),transform:color===c?"scale(1.2)":"scale(1)",transition:"transform .15s"}}/>;
            })}

          <button onClick={function(){if(name.trim())onSave(name.trim(),emoji,color);}} style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",padding:"10px 22px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:700}}>{isEdit?"Zapisz":"Utwórz projekt"}</button>

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  var p1 = useState(defaultProjects); var projects = p1[0]; var setProjects = p1[1];
  var p2 = useState(defaultProjects[0].id); var activeProjId = p2[0]; var setActiveProjId = p2[1];
  var p3 = useState(defaultProjects[0].sheets[0].id); var activeSheetId = p3[0]; var setActiveSheetId = p3[1];
  var p4 = useState(true); var loading = p4[0]; var setLoading = p4[1];
  var p5 = useState(false); var saving = p5[0]; var setSaving = p5[1];
  var p6 = useState(null); var lastSaved = p6[0]; var setLastSaved = p6[1];
  var p7 = useState(true); var sidebarOpen = p7[0]; var setSidebarOpen = p7[1];
  var p8 = useState(null); var editingTab = p8[0]; var setEditingTab = p8[1];
  var p9 = useState(false); var newSheetMode = p9[0]; var setNewSheetMode = p9[1];
  var p10 = useState(""); var newSheetName = p10[0]; var setNewSheetName = p10[1];
  var p11 = useState(null); var projModal = p11[0]; var setProjModal = p11[1];
  var saveDebounced = useRef(null);

  useEffect(function() {
    loadData().then(function(data) {
      setProjects(data);
      setActiveProjId(data[0].id);
      setActiveSheetId(data[0].sheets[0].id);
      setLoading(false);
    });
  }, []);

  useEffect(function() {
    if(loading) return;
    clearTimeout(saveDebounced.current);
    saveDebounced.current = setTimeout(function() {
      setSaving(true);
      saveData(projects).then(function() { setLastSaved(new Date()); setSaving(false); });
    }, 1500);
  }, [projects]);

  var activeProj = projects.find(function(p){return p.id===activeProjId;}) || projects[0];
  var activeSheet = activeProj && (activeProj.sheets.find(function(s){return s.id===activeSheetId;}) || activeProj.sheets[0]);

  var updateSheet = function(sheet) {
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:p.sheets.map(function(s){return s.id===sheet.id?sheet:s;})}):p;});});
  };
  var duplicateSheet = function(sheetId) {
    var src = activeProj.sheets.find(function(s){return s.id===sheetId;});
    if(!src) return;
    var copy = JSON.parse(JSON.stringify(src));
    copy.id = mkId(); copy.name = src.name+" (kopia)";
    copy.rows = copy.rows.map(function(r){return Object.assign({},r,{id:mkId()});});
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:[...p.sheets,copy]}):p;});});
    setActiveSheetId(copy.id);
  };
  var deleteSheet = function(sheetId) {
    if(activeProj.sheets.length<=1) return;
    var rest = activeProj.sheets.filter(function(s){return s.id!==sheetId;});
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:rest}):p;});});
    if(activeSheetId===sheetId) setActiveSheetId(rest[0].id);
  };
  var addSheet = function() {
    if(!newSheetName.trim()) return;
    var s = {id:mkId(),name:"📄 "+newSheetName.trim(),icon:"📄",
      columns:[{id:mkId(),name:"Nazwa",type:"text"},{id:mkId(),name:"Status",type:"status",options:STATUS_OPTS},{id:mkId(),name:"Testy",type:"test"}],rows:[]};
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:[...p.sheets,s]}):p;});});
    setActiveSheetId(s.id); setNewSheetName(""); setNewSheetMode(false);
  };
  var addProject = function(name,emoji,color) {
    var p = {id:mkId(),name:name,emoji:emoji,color:color,sheets:[mkChecklistSheet([])]};
    setProjects(function(ps){return [...ps,p];});
    setActiveProjId(p.id); setActiveSheetId(p.sheets[0].id);
    setProjModal(null);
  };
  var updateProject = function(id,name,emoji,color) {
    setProjects(function(ps){return ps.map(function(p){return p.id===id?Object.assign({},p,{name:name,emoji:emoji,color:color}):p;});});
    setProjModal(null);
  };
  var deleteProject = function(id) {
    if(projects.length<=1) return;
    var rest = projects.filter(function(p){return p.id!==id;});
    setProjects(rest);
    if(activeProjId===id){setActiveProjId(rest[0].id);setActiveSheetId(rest[0].sheets[0].id);}
  };

  var releaseSheet = activeProj && activeProj.sheets.find(function(s){return s.columns && s.columns.find(function(c){return c.id==="col_be";});});
  var releaseHealth = 0;
  if(releaseSheet) {
    var t = releaseSheet.rows.length;
    if(t > 0) {
      var beCol = releaseSheet.columns.find(function(c){return c.id==="col_be";});
      var feCol = releaseSheet.columns.find(function(c){return c.id==="col_fe";});
      var tcCol = releaseSheet.columns.find(function(c){return c.id==="col_testy";});
      var score = 0;
      releaseSheet.rows.forEach(function(r){
        var pts=0;
        if(beCol&&r[beCol.id]==="Zakończone")pts++;
        if(feCol&&r[feCol.id]==="Zakończone")pts++;
        if(tcCol&&r[tcCol.id]&&r[tcCol.id].state==="pass")pts++;
        score+=pts/3;
      });
      releaseHealth = Math.round(score/t*100);
    }
  }
  var hColor = releaseHealth>70?"#34D399":releaseHealth>40?"#FCD34D":"#F87171";

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{fontSize:48,animation:"spin 1.5s linear infinite"}}>⚙️</div>
      <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Wczytywanie…</div>
      <div style={{color:"#64748B",fontSize:13}}>Synchronizacja z Google Sheets</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Segoe UI',system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      {projModal && <ProjectModal initial={projModal} onSave={function(n,e,c){
        if(projModal.id) updateProject(projModal.id,n,e,c);
        else addProject(n,e,c);
      }} onClose={function(){setProjModal(null);}}/>}

      {/* TOPBAR */}
      <div style={{background:"linear-gradient(135deg,#0F172A,#1E293B)",boxShadow:"0 4px 24px rgba(0,0,0,.35)",position:"sticky",top:0,zIndex:100,flexShrink:0}}>
        <div style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={function(){setSidebarOpen(function(o){return !o;});}}
              style={{border:"none",background:"rgba(255,255,255,.06)",color:"#94A3B8",width:34,height:34,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}
              onMouseEnter={function(e){e.currentTarget.style.background="rgba(255,255,255,.12)";}}
              onMouseLeave={function(e){e.currentTarget.style.background="rgba(255,255,255,.06)";}}>☰</button>
            <div style={{width:36,height:36,borderRadius:10,background:activeProj.color+"33",border:"1.5px solid "+activeProj.color+"66",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {activeProj.emoji}
            </div>
            <div>
              <div style={{color:"#fff",fontWeight:900,fontSize:15,letterSpacing:"-.3px"}}>{activeProj.name}</div>
              <div style={{color:"#475569",fontSize:11,display:"flex",alignItems:"center",gap:6}}>
                Release Tracker
                {saving && <span style={{background:"#1E293B",color:"#60A5FA",fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:600,animation:"pulse 1s infinite"}}>⏳ Zapisywanie…</span>}
                {!saving && lastSaved && <span style={{background:"#1E293B",color:"#34D399",fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:600}}>✓ {lastSaved.toLocaleTimeString("pl")}</span>}
              </div>
            </div>
          </div>
          {releaseSheet && (
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div>
                <div style={{color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4,textAlign:"right"}}>Release Health</div>
                <div style={{width:140,height:5,background:"#1E293B",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:releaseHealth+"%",background:hColor,borderRadius:99,transition:"width .8s"}}/>
                </div>
              </div>
              <div style={{fontSize:22,fontWeight:900,color:hColor,letterSpacing:"-1.5px",minWidth:48,textAlign:"right"}}>{releaseHealth}%</div>
            </div>
          )}
        </div>
        {/* TABS */}
        <div style={{padding:"0 16px",display:"flex",alignItems:"stretch",overflowX:"auto",gap:2}}>
          {activeProj.sheets.map(function(s){
            var isA = activeSheetId===s.id;
            return (
              <div key={s.id} className="tab-pill" onClick={function(){setActiveSheetId(s.id);}}
                style={{display:"flex",alignItems:"center",gap:5,padding:"0 10px",cursor:"pointer",flexShrink:0,
                  borderBottom:isA?"3px solid #60A5FA":"3px solid transparent"}}>
                <span style={{fontSize:12}}>{s.icon||"📄"}</span>
                {editingTab===s.id ? (
                  <input autoFocus value={s.name.replace(/^\S+\s/,"")}
                    onBlur={function(){setEditingTab(null);}}
                    onKeyDown={function(e){if(e.key==="Enter")setEditingTab(null);}}
                    onChange={function(e){var v=e.target.value;setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:p.sheets.map(function(x){return x.id===s.id?Object.assign({},x,{name:(s.icon||"📄")+" "+v}):x;})}):p;});});}}
                    style={{border:"1px solid #60A5FA",background:"transparent",color:"#fff",fontSize:12,fontFamily:"inherit",borderRadius:4,padding:"2px 6px",width:120}}/>
                ) : (
                  <span onDoubleClick={function(){setEditingTab(s.id);}}
                    style={{color:isA?"#F8FAFC":"#94A3B8",fontSize:12,fontWeight:isA?700:500,padding:"14px 0",whiteSpace:"nowrap"}}>
                    {s.name.replace(/^\S+\s/,"")}
                  </span>
                )}
                <button onClick={function(e){e.stopPropagation();duplicateSheet(s.id);}} title="Duplikuj"
                  style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:11,padding:"1px 3px",borderRadius:3,opacity:.5}}
                  onMouseEnter={function(e){e.currentTarget.style.color="#60A5FA";e.currentTarget.style.opacity=1;e.currentTarget.style.background="#1E293B";}}
                  onMouseLeave={function(e){e.currentTarget.style.color="#334155";e.currentTarget.style.opacity=.5;e.currentTarget.style.background="none";}}>⧉</button>
                {activeProj.sheets.length>1 && (
                  <button onClick={function(e){e.stopPropagation();deleteSheet(s.id);}}
                    style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:11,padding:"1px 4px",borderRadius:4,opacity:.5}}
                    onMouseEnter={function(e){e.currentTarget.style.color="#F87171";e.currentTarget.style.opacity=1;}}
                    onMouseLeave={function(e){e.currentTarget.style.color="#334155";e.currentTarget.style.opacity=.5;}}>✕</button>
                )}
              </div>
            );
          })}
          {newSheetMode ? (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px"}}>
              <input autoFocus value={newSheetName} onChange={function(e){setNewSheetName(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")addSheet();if(e.key==="Escape")setNewSheetMode(false);}}
                placeholder="Nazwa arkusza…" style={{border:"1px solid #60A5FA",background:"rgba(255,255,255,.08)",color:"#fff",fontSize:12,borderRadius:8,padding:"4px 10px",fontFamily:"inherit",width:150}}/>
              <button onClick={addSheet} style={{border:"none",background:"#10B981",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✓</button>
              <button onClick={function(){setNewSheetMode(false);}} style={{border:"none",background:"#475569",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          ) : (
            <button onClick={function(){setNewSheetMode(true);}}
              style={{border:"none",background:"transparent",color:"#475569",cursor:"pointer",fontSize:22,padding:"0 12px",fontWeight:300,lineHeight:1}}
              onMouseEnter={function(e){e.currentTarget.style.color="#60A5FA";}} onMouseLeave={function(e){e.currentTarget.style.color="#475569";}}>+</button>
          )}
        </div>
      </div>

      {/* BODY */}
      <div style={{display:"flex",flex:1,minHeight:0}}>
        {/* SIDEBAR */}
        {sidebarOpen && (
          <div style={{width:240,background:"#0F172A",flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid #1E293B",animation:"slideLeft .2s ease"}}>
            <div style={{padding:"16px 14px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:11,fontWeight:800,color:"#334155",textTransform:"uppercase",letterSpacing:".08em"}}>Projekty</span>
              <button onClick={function(){setProjModal({});}} title="Nowy projekt"
                style={{border:"none",background:"rgba(96,165,250,.12)",color:"#60A5FA",width:26,height:26,borderRadius:6,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}
                onMouseEnter={function(e){e.currentTarget.style.background="rgba(96,165,250,.25)";}}
                onMouseLeave={function(e){e.currentTarget.style.background="rgba(96,165,250,.12)";}}>+</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"0 8px 16px"}}>
              {projects.map(function(p){
                var isActive = p.id===activeProjId;
                var totalRows = p.sheets.reduce(function(sum,s){return sum+s.rows.length;},0);
                return (
                  <div key={p.id} className="proj-item" onClick={function(){setActiveProjId(p.id);setActiveSheetId(p.sheets[0].id);}}
                    style={{padding:"10px 12px",borderRadius:10,cursor:"pointer",marginBottom:4,
                      background:isActive?"rgba(96,165,250,.1)":"transparent",
                      border:"1px solid "+(isActive?"rgba(96,165,250,.2)":"transparent"),transition:"all .15s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:9}}>
                      <div style={{width:32,height:32,borderRadius:8,background:p.color+"22",border:"1.5px solid "+p.color+"55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                        {p.emoji}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:isActive?"#F8FAFC":"#94A3B8",fontWeight:isActive?700:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                        <div style={{color:"#334155",fontSize:10,marginTop:2}}>{p.sheets.length} ark. · {totalRows} wierszy</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                        <button onClick={function(e){e.stopPropagation();setProjModal(p);}} style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1}}
                          onMouseEnter={function(e){e.currentTarget.style.color="#60A5FA";}} onMouseLeave={function(e){e.currentTarget.style.color="#334155";}}>✏️</button>
                        {projects.length>1 && <button onClick={function(e){e.stopPropagation();deleteProject(p.id);}} style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:10,padding:"1px 3px",borderRadius:3,lineHeight:1}}
                          onMouseEnter={function(e){e.currentTarget.style.color="#F87171";}} onMouseLeave={function(e){e.currentTarget.style.color="#334155";}}>🗑</button>}
                      </div>
                    </div>
                    {isActive && (
                      <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.05)"}}>
                        {p.sheets.map(function(s){
                          return (
                            <div key={s.id} onClick={function(e){e.stopPropagation();setActiveSheetId(s.id);}}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"4px 6px",borderRadius:6,cursor:"pointer",marginBottom:2,
                                background:activeSheetId===s.id?"rgba(96,165,250,.15)":"transparent"}}
                              onMouseEnter={function(e){if(activeSheetId!==s.id)e.currentTarget.style.background="rgba(255,255,255,.04)";}}
                              onMouseLeave={function(e){if(activeSheetId!==s.id)e.currentTarget.style.background="transparent";}}>
                              <span style={{fontSize:11}}>{s.icon||"📄"}</span>
                              <span style={{fontSize:12,color:activeSheetId===s.id?"#93C5FD":"#475569",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{s.name.replace(/^\S+\s/,"")}</span>
                              <span style={{fontSize:10,color:"#334155",flexShrink:0}}>{s.rows.length}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{padding:"12px",borderTop:"1px solid #1E293B",fontSize:10,color:"#334155",lineHeight:1.6}}>
              💡 Kliknij # wiersza → szczegóły<br/>
              ✨ Import → wklej tekst z ChatGPT<br/>
              ⧉ Duplikuj arkusz · + Nowy projekt
            </div>
          </div>
        )}

        {/* MAIN CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
          {activeSheet && (
            <div key={activeSheet.id} style={{animation:"slideIn .2s ease"}}>
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:22,fontWeight:900,color:"#0F172A",letterSpacing:"-.5px",margin:0}}>{activeSheet.name}</h1>
                <p style={{color:"#94A3B8",fontSize:12,margin:"5px 0 0"}}>
                  Projekt: <strong style={{color:activeProj.color}}>{activeProj.emoji} {activeProj.name}</strong>
                  &nbsp;·&nbsp;{activeSheet.rows.length} wierszy
                  &nbsp;·&nbsp;Kliknij <strong>#</strong> wiersza → panel szczegółów
                  &nbsp;·&nbsp;<strong>✨ Import</strong> → wklej tekst / plik
                </p>
              </div>
              <SheetView sheet={activeSheet} onChange={updateSheet}/>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
