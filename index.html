// ── IMPORT MODAL ─────────────────────────────────────────────────────────────
function ImportModal({columns, onImport, onClose}) {
  var [text, setText] = useState("");
  var [separator, setSeparator] = useState("tab");
  var [preview, setPreview] = useState([]);
  var [headers, setHeaders] = useState([]);
  var [mapping, setMapping] = useState({});
  var [step, setStep] = useState(1);
  var fileRef = useRef();

  var parseText = function(raw, sep) {
    var lines = raw.trim().split("\n").filter(function(l){return l.trim();});
    if (!lines.length) return;
    var delim = sep==="tab"?"\t":sep==="comma"?",":sep==="semicolon"?";":"|";
    var parsed = lines.map(function(l){
      return l.split(delim).map(function(c){return c.trim().replace(/^["']|["']$/g,"");});
    });
    var firstRow = parsed[0];
    var colCount = Math.max.apply(null, parsed.map(function(r){return r.length;}));
    var autoHeaders = firstRow.map(function(h,i){
      var lower = (h||"").toLowerCase();
      if(lower.includes("funkc")||lower.includes("nazwa")||lower.includes("feature")) return "Funkcjonalność";
      if(lower.includes("opis")||lower.includes("desc")) return "Opis";
      if(lower.includes("status")) return "Status";
      if(lower.includes("task")||lower.includes("ticket")||lower.includes("jira")) return "Task";
      if(lower.includes("kom")||lower.includes("note")||lower.includes("uwag")) return "Komentarz";
      return h || ("Kolumna "+(i+1));
    });
    var looksLikeHeader = firstRow.some(function(h){
      return isNaN(h) && h.length < 30 && h===h;
    });
    if (looksLikeHeader) {
      setHeaders(autoHeaders);
      setPreview(parsed.slice(1));
      var m = {};
      columns.forEach(function(col) {
        autoHeaders.forEach(function(h,i) {
          if(h.toLowerCase()===col.name.toLowerCase()) m[i]=col.id;
        });
      });
      setMapping(m);
    } else {
      var genHeaders = [];
      for(var i=0;i<colCount;i++) genHeaders.push("Kolumna "+(i+1));
      setHeaders(genHeaders);
      setPreview(parsed);
      setMapping({});
    }
    setStep(2);
  };

  var handleFile = function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      setText(content);
      var hasTabs = content.includes("\t");
      var hasSemicolon = content.includes(";");
      var detectedSep = hasTabs?"tab":hasSemicolon?"semicolon":"comma";
      setSeparator(detectedSep);
      parseText(content, detectedSep);
    };
    reader.readAsText(file);
  };

  var doImport = function() {
    var newRows = preview.map(function(row) {
      var newRow = {id:mkId()};
      columns.forEach(function(col) {
        if(col.type==="checkbox") newRow[col.id]=false;
        else if(col.type==="test") newRow[col.id]=emptyTest();
        else if(col.type==="url") newRow[col.id]={label:"",url:""};
        else if(col.type==="status") newRow[col.id]=(col.options&&col.options[1]&&col.options[1].label)||"Nie rozpoczęte";
        else newRow[col.id]="";
      });
      Object.keys(mapping).forEach(function(colIdx) {
        var targetColId = mapping[colIdx];
        var cellVal = row[parseInt(colIdx)] || "";
        var targetCol = columns.find(function(c){return c.id===targetColId;});
        if(targetCol) newRow[targetColId] = cellVal;
      });
      return newRow;
    });
    onImport(newRows);
  };

  var textCols = columns.filter(function(c){return c.type==="text";});

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.7)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}
      onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:24,width:680,maxWidth:"calc(100vw - 32px)",maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 30px 80px rgba(0,0,0,.3)",animation:"popIn .2s"}}>
        <div style={{padding:"20px 28px 16px",background:"linear-gradient(135deg,#0F172A,#1E293B)",color:"#fff",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#64748B",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Krok {step} z 2</div>
              <h3 style={{fontSize:18,fontWeight:800,color:"#fff",margin:0}}>{step===1?"📋 Wklej lub wgraj dane":"🎯 Dopasuj kolumny"}</h3>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,.1)",color:"#fff",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16}}>✕</button>
          </div>
          <div style={{display:"flex",gap:0,marginTop:12}}>
            {[1,2].map(function(s){
              return (
                <div key={s} style={{flex:1,height:3,background:step>=s?"#60A5FA":"#334155",borderRadius:99,marginRight:s<2?4:0,transition:"background .3s"}}/>
              );
            })}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"20px 28px"}}>
          {step===1 && (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#64748B",alignSelf:"center"}}>Separator:</div>
                {[{v:"tab",l:"Tab (Excel/Sheets)"},{v:"semicolon",l:"Średnik (;)"},{v:"comma",l:"Przecinek (,)"},{v:"pipe",l:"Pipe (|)"}].map(function(s){
                  return (
                    <button key={s.v} onClick={function(){setSeparator(s.v);}} style={{
                      border:"1.5px solid "+(separator===s.v?"#3B82F6":"#E2E8F0"),
                      background:separator===s.v?"#EFF6FF":"transparent",color:separator===s.v?"#1D4ED8":"#64748B",
                      padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600
                    }}>{s.l}</button>
                  );
                })}
              </div>

              <div style={{border:"2px dashed #E2E8F0",borderRadius:16,padding:"20px",marginBottom:16,
                background:"#FAFBFF",cursor:"pointer",textAlign:"center",transition:"all .15s"}}
                onClick={function(){if(fileRef.current)fileRef.current.click();}}
                onDragOver={function(e){e.preventDefault();e.currentTarget.style.borderColor="#3B82F6";e.currentTarget.style.background="#EFF6FF";}}
                onDragLeave={function(e){e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.background="#FAFBFF";}}
                onDrop={function(e){
                  e.preventDefault();
                  e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.background="#FAFBFF";
                  var file = e.dataTransfer.files[0];
                  if(file) handleFile(file);
                }}>
                <div style={{fontSize:32,marginBottom:8}}>📂</div>
                <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:4}}>Przeciągnij plik CSV / Excel (TSV)</div>
                <div style={{fontSize:12,color:"#94A3B8"}}>lub kliknij aby wybrać plik</div>
                <input ref={fileRef} type="file" accept=".csv,.tsv,.txt,.xlsx" style={{display:"none"}}
                  onChange={function(e){if(e.target.files[0])handleFile(e.target.files[0]);}}/>
              </div>

              <div style={{position:"relative",marginBottom:16}}>
                <div style={{position:"absolute",top:0,left:0,right:0,display:"flex",alignItems:"center",gap:10,padding:"0 16px"}}>
                  <div style={{flex:1,height:1,background:"#E2E8F0"}}/>
                  <span style={{fontSize:11,color:"#94A3B8",fontWeight:700,textTransform:"uppercase"}}>lub wklej ręcznie</span>
                  <div style={{flex:1,height:1,background:"#E2E8F0"}}/>
                </div>
              </div>
              <div style={{marginTop:16}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",display:"block",marginBottom:8}}>Wklej dane (z Excela, Sheets, Notepada…)</label>
                <textarea value={text} onChange={function(e){setText(e.target.value);}}
                  placeholder={"Funkcjonalność\tOpis\nLogowanie\tSprawdzenie logowania\nRejestracja\tWalidacja pól\n\nLub wklej Ctrl+V skopiowane komórki z Excel / Google Sheets"}
                  rows={8} style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:12,padding:"12px 14px",
                    fontSize:12,fontFamily:"'Courier New',monospace",resize:"vertical",lineHeight:1.6,background:"#FAFBFF"}}
                  onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}}
                  onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
              </div>
            </div>
          )}

          {step===2 && (
            <div>
              <div style={{padding:"10px 14px",background:"#EFF6FF",borderRadius:10,border:"1px solid #BFDBFE",marginBottom:16,fontSize:13,color:"#1E3A8A"}}>
                Znaleziono <strong>{preview.length} wierszy</strong>. Dopasuj kolumny z importu do kolumn tabeli.
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {headers.map(function(h,i){
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#F8FAFC",borderRadius:10,border:"1px solid #E2E8F0"}}>
                      <div style={{width:140,flexShrink:0}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Kolumna importu</div>
                        <div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>{h}</div>
                        <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{preview[0] && preview[0][i] ? '"'+preview[0][i].slice(0,25)+'"' : "—"}</div>
                      </div>
                      <div style={{fontSize:18,color:"#CBD5E1"}}>→</div>
                      <select value={mapping[i]||""} onChange={function(e){
                        var val = e.target.value;
                        var idx = i;
                        setMapping(function(m){var nm=Object.assign({},m);if(val)nm[idx]=val;else delete nm[idx];return nm;});
                      }} style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",background:"#fff",cursor:"pointer"}}
                        onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}>
                        <option value="">— Pomiń tę kolumnę —</option>
                        {textCols.map(function(col){return <option key={col.id} value={col.id}>{col.name}</option>;})}
                      </select>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:11,color:"#94A3B8",marginBottom:8}}>Podgląd (pierwsze 3 wiersze):</div>
              <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #E2E8F0",fontSize:12}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:"#F8FAFC"}}>
                      {headers.map(function(h,i){return <th key={i} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#64748B",fontSize:11,borderBottom:"1px solid #E2E8F0"}}>{h}{mapping[i]?" → "+columns.find(function(c){return c.id===mapping[i];})&&columns.find(function(c){return c.id===mapping[i];}).name:""}</th>;})}
                    </tr>
                  </thead>
                  <tbody>
                    {preview.slice(0,3).map(function(row,ri){
                      return (
                        <tr key={ri} style={{borderBottom:"1px solid #F1F5F9"}}>
                          {row.map(function(cell,ci){return <td key={ci} style={{padding:"7px 10px",color:"#334155"}}>{cell}</td>;})}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>

        <div style={{padding:"16px 28px",borderTop:"1px solid #F1F5F9",display:"flex",gap:10,justifyContent:"space-between",flexShrink:0}}>
          <button onClick={step===1?onClose:function(){setStep(1);}} style={{border:"1.5px solid #E2E8F0",background:"transparent",color:"#64748B",padding:"10px 20px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:14}}>
            {step===1?"Anuluj":"← Wstecz"}
          </button>
          <button onClick={step===1?function(){if(text.trim())parseText(text,separator);}:doImport}
            disabled={step===1?!text.trim():Object.keys(mapping).length===0}
            style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",padding:"10px 28px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,opacity:(step===1?!text.trim():Object.keys(mapping).length===0)?0.4:1}}>
            {step===1?"Dalej →":"✅ Importuj "+preview.length+" wierszy"}
          </button>
        </div>
      </div>
    </div>, document.body
  );
}

// ── ROW DETAIL PANEL ─────────────────────────────────────────────────────────
function RowDetailPanel({row, columns, onClose, onUpdate}) {
  var [draft, setDraft] = useState(Object.assign({},row));
  var save = function(){onUpdate(draft);onClose();};
  var updateField = function(colId,val){setDraft(function(d){return Object.assign({},d,{[colId]:val});});};
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:8888,display:"flex"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(15,23,42,.4)",backdropFilter:"blur(3px)"}}/>
      <div style={{width:480,maxWidth:"90vw",background:"#fff",height:"100vh",overflowY:"auto",
        boxShadow:"-20px 0 60px rgba(0,0,0,.2)",animation:"slideRight .2s ease",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"20px 24px 16px",background:"linear-gradient(135deg,#0F172A,#1E293B)",color:"#fff",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#64748B",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Szczegóły wiersza</div>
              <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>{(columns[0] && draft[columns[0].id])||"Nowy wiersz"}</div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,.1)",color:"#fff",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16}}>✕</button>
          </div>
        </div>
        <div style={{flex:1,padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>
          {columns.map(function(col) {
            return (
              <div key={col.id}>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:800,color:"#64748B",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>
                  {col.type==="status"?"🎯":col.type==="test"?"🧪":col.type==="checkbox"?"☑️":col.type==="url"?"🔗":col.comment?"💬":"✏️"} {col.name}
                </label>
                {col.type==="status" ? (
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {(col.options||STATUS_OPTS).map(function(o){
                      return (
                        <div key={o.label} onClick={function(){updateField(col.id,o.label);}}
                          style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                            background:o.bg,border:"2px solid "+(draft[col.id]===o.label?o.dot:o.border),color:o.color,
                            boxShadow:draft[col.id]===o.label?"0 0 0 3px "+o.dot+"28":"none",transition:"all .15s"}}>
                          {o.label} {draft[col.id]===o.label&&"✓"}
                        </div>
                      );
                    })}
                  </div>
                ) : col.type==="test" ? (
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {TEST_STATES.map(function(t){
                      var curState = (draft[col.id] && draft[col.id].state) || "untested";
                      return (
                        <div key={t.key} onClick={function(){updateField(col.id,Object.assign({},draft[col.id]||emptyTest(),{state:t.key}));}}
                          style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:20,cursor:"pointer",
                            background:t.bg,border:"2px solid "+(curState===t.key?t.dot:t.border),
                            boxShadow:curState===t.key?"0 0 0 3px "+t.dot+"28":"none",transition:"all .15s"}}>
                          <span style={{color:t.dot,fontWeight:900}}>{t.icon}</span>
                          <span style={{color:t.color,fontWeight:700,fontSize:12}}>{t.label}</span>
                        </div>
                      );
                    })}
                  </div>
                ) : col.type==="checkbox" ? (
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <CheckCell value={!!draft[col.id]} onChange={function(v){updateField(col.id,v);}}/>
                    <span style={{fontSize:13,color:"#64748B"}}>{draft[col.id]?"Zaznaczone":"Niezaznaczone"}</span>
                  </div>
                ) : (
                  <textarea value={draft[col.id]||""} onChange={function(e){updateField(col.id,e.target.value);}}
                    rows={col.comment?4:2} placeholder={"Wpisz "+col.name.toLowerCase()+"…"}
                    style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",
                      fontSize:13,fontFamily:"inherit",resize:"vertical",lineHeight:1.6,color:"#1E293B",
                      background:"#FAFBFF",minHeight:col.comment?80:44}}
                    onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}}
                    onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
                )}
              </div>
            );
          })}
        </div>
        <div style={{padding:"16px 24px",borderTop:"1px solid #F1F5F9",display:"flex",gap:10,justifyContent:"flex-end",flexShrink:0}}>
          <button onClick={onClose} style={{border:"1.5px solid #E2E8F0",background:"transparent",color:"#64748B",padding:"10px 20px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:14}}>Anuluj</button>
          <button onClick={save} style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",padding:"10px 24px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>💾 Zapisz</button>
        </div>
      </div>
    </div>, document.body
  );
}

// ── COLUMN MODAL ─────────────────────────────────────────────────────────────
function ColumnModal({col, onSave, onClose}) {
  var isNew = !col.id;
  var [name, setName] = useState(col.name||"");
  var [type, setType] = useState(col.type||"text");
  var [isComment, setIsComment] = useState(!!col.comment);
  var [statusOpts, setStatusOpts] = useState(col.type==="status"?(col.options||[]):[{label:"Opcja 1",bg:"#D1FAE5",color:"#065F46",dot:"#10B981",border:"#6EE7B7"},{label:"Opcja 2",bg:"#FEE2E2",color:"#991B1B",dot:"#EF4444",border:"#FCA5A5"}]);
  var addOpt = function(){setStatusOpts(function(o){return [...o,Object.assign({label:"Nowa opcja"},PALETTE[o.length%PALETTE.length])];});};
  var removeOpt = function(i){setStatusOpts(function(o){return o.filter(function(_,idx){return idx!==i;});});};
  var save = function() {
    if (!name.trim()) return;
    var base = {id:col.id||mkId(),name:name.trim(),type:type};
    if (type==="status") {onSave(Object.assign({},base,{options:statusOpts.filter(function(o){return o.label.trim();})}));return;}
    if (type==="text") {onSave(Object.assign({},base,isComment?{comment:true}:{}));return;}
    onSave(base);
  };
  var TYPES = [
    {val:"text",icon:"✏️",label:"Tekst"},{val:"status",icon:"🎯",label:"Status"},
    {val:"test",icon:"🧪",label:"Testy"},{val:"url",icon:"🔗",label:"Link"},
    {val:"checkbox",icon:"☑️",label:"Checkbox"},{val:"number",icon:"🔢",label:"Liczba"},
  ];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.6)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}
      onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:20,padding:32,width:480,maxWidth:"calc(100vw - 32px)",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 30px 80px rgba(0,0,0,.3)",animation:"popIn .2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h3 style={{fontSize:20,fontWeight:800,color:"#0F172A"}}>{isNew?"➕ Nowa kolumna":"✏️ Edytuj kolumnę"}</h3>
          <button onClick={onClose} style={{border:"none",background:"#F1F5F9",fontSize:16,cursor:"pointer",color:"#64748B",width:32,height:32,borderRadius:8}}>✕</button>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Nazwa kolumny</label>
          <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="np. Priorytet, Assignee…"
            style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 14px",fontSize:14,fontFamily:"inherit",color:"#1E293B"}}
            onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Typ pola</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {TYPES.map(function(t){
              return (
                <div key={t.val} onClick={function(){setType(t.val);}} style={{
                  padding:"8px 14px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                  background:type===t.val?"#0F172A":"#F8FAFC",color:type===t.val?"#fff":"#64748B",
                  border:"2px solid "+(type===t.val?"#0F172A":"#E2E8F0"),transition:"all .15s"
                }}>{t.icon} {t.label}</div>
              );
            })}
          </div>
        </div>
        {type==="text" && (
          <div onClick={function(){setIsComment(!isComment);}} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"#F8FAFC",borderRadius:10,border:"1.5px solid "+(isComment?"#3B82F6":"#E2E8F0"),cursor:"pointer",marginBottom:16}}>
            <input type="checkbox" checked={isComment} readOnly style={{width:16,height:16,accentColor:"#3B82F6"}}/>
            <div><div style={{fontSize:13,fontWeight:700,color:"#1E293B"}}>💬 Pole komentarzowe</div><div style={{fontSize:11,color:"#64748B",marginTop:2}}>Otwiera panel z dużym polem tekstowym</div></div>
          </div>
        )}
        {type==="status" && (
          <div style={{marginBottom:18}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Opcje statusu</label>
            {statusOpts.map(function(o,i){
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    {PALETTE.map(function(p,pi){
                      return <div key={pi} onClick={function(){setStatusOpts(function(opts){return opts.map(function(x,idx){return idx===i?Object.assign({},x,p):x;});});}} style={{width:16,height:16,borderRadius:"50%",background:p.dot,cursor:"pointer",border:o.dot===p.dot?"2.5px solid #0F172A":"2px solid transparent",transform:o.dot===p.dot?"scale(1.25)":"scale(1)",transition:"transform .1s"}}/>;
                    })}
                  </div>
                  <div style={{flex:1,padding:"5px 12px",borderRadius:20,background:o.bg,border:"1.5px solid "+o.dot+"55"}}>
                    <input value={o.label} onChange={function(e){var v=e.target.value;setStatusOpts(function(opts){return opts.map(function(x,idx){return idx===i?Object.assign({},x,{label:v}):x;});});}} style={{border:"none",background:"transparent",width:"100%",color:o.color,fontWeight:700,fontSize:12,fontFamily:"inherit"}}/>
                  </div>
                  <button onClick={function(){removeOpt(i);}} style={{border:"none",background:"none",cursor:"pointer",color:"#CBD5E1",fontSize:15}} onMouseEnter={function(e){e.currentTarget.style.color="#EF4444";}} onMouseLeave={function(e){e.currentTarget.style.color="#CBD5E1";}}>✕</button>
                </div>
              );
            })}
            <button onClick={addOpt} style={{border:"1.5px dashed #CBD5E1",background:"transparent",color:"#64748B",padding:"5px 14px",borderRadius:8,cursor:"pointer",fontSize:12,marginTop:4}}>+ Dodaj opcję</button>
          </div>
        )}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={onClose} style={{border:"1.5px solid #E2E8F0",background:"transparent",color:"#64748B",padding:"10px 22px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:600}}>Anuluj</button>
          <button onClick={save} style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",padding:"10px 22px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:700}}>{isNew?"Dodaj":"Zapisz"}</button>
        </div>
      </div>
    </div>
  );
}

// ── SHEET VIEW ────────────────────────────────────────────────────────────────
function SheetView({sheet, onChange}) {
  var [colModal, setColModal] = useState(null);
  var [editingHeader, setEditingHeader] = useState(null);
  var [hoveredRow, setHoveredRow] = useState(null);
  var [detailRow, setDetailRow] = useState(null);
  var [search, setSearch] = useState("");
  var [importModal, setImportModal] = useState(false);

  var updateRow = function(rowId,colId,val){onChange(Object.assign({},sheet,{rows:sheet.rows.map(function(r){return r.id===rowId?Object.assign({},r,{[colId]:val}):r;})}));};
  var updateFullRow = function(newRow){onChange(Object.assign({},sheet,{rows:sheet.rows.map(function(r){return r.id===newRow.id?newRow:r;})}));};
  var addRow = function() {
    var row = {id:mkId()};
    sheet.columns.forEach(function(c) {
      if(c.type==="checkbox") row[c.id]=false;
      else if(c.type==="test") row[c.id]=emptyTest();
      else if(c.type==="url") row[c.id]={label:"",url:""};
      else if(c.type==="status") row[c.id]=(c.options&&c.options[1]&&c.options[1].label)||"Nie rozpoczęte";
      else row[c.id]="";
    });
    onChange(Object.assign({},sheet,{rows:[...sheet.rows,row]}));
  };
  var deleteRow = function(id){onChange(Object.assign({},sheet,{rows:sheet.rows.filter(function(r){return r.id!==id;})}));};
  var saveCol = function(col) {
    var def = col.type==="checkbox"?false:col.type==="test"?emptyTest():col.type==="url"?{label:"",url:""}:col.type==="status"?((col.options&&col.options[0]&&col.options[0].label)||""):"";
    if(colModal.isNew) onChange(Object.assign({},sheet,{columns:[...sheet.columns,col],rows:sheet.rows.map(function(r){return Object.assign({},r,{[col.id]:def});})}));
    else onChange(Object.assign({},sheet,{columns:sheet.columns.map(function(c,i){return i===colModal.idx?col:c;})}));
    setColModal(null);
  };
  var deleteCol = function(idx) {
    var col = sheet.columns[idx];
    onChange(Object.assign({},sheet,{columns:sheet.columns.filter(function(_,i){return i!==idx;}),rows:sheet.rows.map(function(r){var nr=Object.assign({},r);delete nr[col.id];return nr;})}));
  };
  var importRows = function(newRows) {
    onChange(Object.assign({},sheet,{rows:[...sheet.rows,...newRows]}));
    setImportModal(false);
  };
  var exportToClipboard = function() {
    var headers = sheet.columns.map(function(c){return c.name;}).join("\t");
    var rows = sheet.rows.map(function(r){
      return sheet.columns.map(function(c){
        var v = r[c.id];
        if(c.type==="test") return (v&&v.state)||"";
        if(c.type==="checkbox") return v?"TAK":"NIE";
        if(c.type==="url") return (v&&v.url)||"";
        return v||"";
      }).join("\t");
    }).join("\n");
    navigator.clipboard.writeText(headers+"\n"+rows).then(function(){
      alert("✅ Skopiowano!\nWklej Ctrl+V w Google Sheets lub Excel.");
    });
  };

  var total = sheet.rows.length;
  var statusCols = sheet.columns.filter(function(c){return c.type==="status";});
  var checkCols = sheet.columns.filter(function(c){return c.type==="checkbox";});
  var testCols = sheet.columns.filter(function(c){return c.type==="test";});
  var donePct = statusCols.length&&total ? Math.round(sheet.rows.filter(function(r){return r[statusCols[0].id]==="Zakończone";}).length/total*100) : null;
  var ts = null;
  if(testCols.length&&total) {
    var counts = {pass:0,fail:0,running:0,skipped:0,untested:0};
    sheet.rows.forEach(function(r){testCols.forEach(function(c){var s=(r[c.id]&&typeof r[c.id]==="object")?r[c.id].state:"untested";counts[s]=(counts[s]||0)+1;});});
    ts = counts;
  }
  var filtered = search.trim() ? sheet.rows.filter(function(r){
    return sheet.columns.some(function(c){
      var v=r[c.id];
      var str=c.type==="test"?(v&&v.state)||"":c.type==="url"?((v&&v.label)||"")+((v&&v.url)||""):String(v||"");
      return str.toLowerCase().includes(search.toLowerCase());
    });
  }) : sheet.rows;

  var H = {padding:"11px 13px",fontWeight:700,fontSize:11,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".07em",background:"#0F172A",borderBottom:"1px solid #1E293B",whiteSpace:"nowrap",textAlign:"left"};
  var C = {padding:"9px 12px",fontSize:13,color:"#334155",borderBottom:"1px solid #F1F5F9",verticalAlign:"middle"};

  return (
    <div>
      {colModal && <ColumnModal col={colModal.col} onSave={saveCol} onClose={function(){setColModal(null);}}/>}
      {detailRow && <RowDetailPanel row={detailRow} columns={sheet.columns} onClose={function(){setDetailRow(null);}} onUpdate={updateFullRow}/>}
      {importModal && <ImportModal columns={sheet.columns} onImport={importRows} onClose={function(){setImportModal(false);}}/>}

      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"stretch"}}>
        <div style={{padding:"12px 20px",borderRadius:14,background:"linear-gradient(135deg,#1E293B,#334155)",minWidth:90}}>
          <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-1px"}}>{total}</div>
          <div style={{fontSize:11,color:"#94A3B8",fontWeight:600,marginTop:1}}>Łącznie</div>
        </div>
        {donePct!==null && (
          <div style={{padding:"12px 20px",borderRadius:14,background:"#fff",border:"1px solid #E2E8F0",minWidth:165,display:"flex",flexDirection:"column",justifyContent:"center",gap:7}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em"}}>Postęp</span>
              <span style={{fontSize:16,fontWeight:900,color:"#0F172A"}}>{donePct}%</span>
            </div>
            <ProgressBar value={donePct} color="#10B981"/>
          </div>
        )}
        {ts && (
          <div style={{padding:"12px 18px",borderRadius:14,background:"#fff",border:"1px solid #E2E8F0",display:"flex",flexDirection:"column",gap:8,minWidth:230}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em"}}>🧪 Wyniki testów</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[{key:"pass",label:"Przeszły",color:"#065F46",bg:"#D1FAE5",dot:"#10B981"},{key:"fail",label:"Błąd",color:"#991B1B",bg:"#FEE2E2",dot:"#EF4444"},{key:"running",label:"W trakcie",color:"#854D0E",bg:"#FEF9C3",dot:"#EAB308"},{key:"untested",label:"Brak",color:"#475569",bg:"#F1F5F9",dot:"#94A3B8"}].filter(function(s){return ts[s.key]>0;}).map(function(s){
                return (
                  <div key={s.key} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,background:s.bg}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:s.dot}}/>
                    <span style={{fontSize:13,fontWeight:800,color:s.color}}>{ts[s.key]}</span>
                    <span style={{fontSize:10,color:s.color,opacity:.75}}>{s.label}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",height:5,borderRadius:99,overflow:"hidden",gap:1}}>
              {ts.pass>0&&<div style={{flex:ts.pass,background:"#10B981"}}/>}
              {ts.fail>0&&<div style={{flex:ts.fail,background:"#EF4444"}}/>}
              {ts.running>0&&<div style={{flex:ts.running,background:"#EAB308"}}/>}
              {ts.untested>0&&<div style={{flex:ts.untested,background:"#E2E8F0"}}/>}
            </div>
          </div>
        )}
        {checkCols.map(function(c){
          var pct = total?Math.round(sheet.rows.filter(function(r){return r[c.id];}).length/total*100):0;
          return (
            <div key={c.id} style={{padding:"12px 20px",borderRadius:14,background:"linear-gradient(135deg,#6B21A8,#7C3AED)"}}>
              <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-1px"}}>{pct}%</div>
              <div style={{fontSize:11,color:"#E9D5FF",fontWeight:600,marginTop:1}}>{c.name}</div>
            </div>
          );
        })}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8",fontSize:14}}>🔍</span>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Szukaj…"
              style={{padding:"8px 12px 8px 32px",border:"1.5px solid #E2E8F0",borderRadius:10,fontSize:13,fontFamily:"inherit",background:"#fff",color:"#1E293B",width:180}}
              onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
          </div>
          <button onClick={function(){setImportModal(true);}} title="Importuj z Excel / Google Sheets / wklej"
            style={{border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",padding:"8px 14px",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}
            onMouseEnter={function(e){e.currentTarget.style.borderColor="#3B82F6";e.currentTarget.style.color="#1D4ED8";e.currentTarget.style.background="#EFF6FF";}}
            onMouseLeave={function(e){e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.color="#475569";e.currentTarget.style.background="#fff";}}>
            📋 Import
          </button>
          <button onClick={exportToClipboard} title="Kopiuj do schowka — wklej w Google Sheets lub Excel"
            style={{border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",padding:"8px 14px",borderRadius:10,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}
            onMouseEnter={function(e){e.currentTarget.style.borderColor="#10B981";e.currentTarget.style.color="#065F46";e.currentTarget.style.background="#F0FDF4";}}
            onMouseLeave={function(e){e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.color="#475569";e.currentTarget.style.background="#fff";}}>
            📥 Eksport
          </button>
        </div>
      </div>

      <div style={{borderRadius:16,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,.1)",border:"1px solid #E2E8F0"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",background:"#fff"}}>
            <thead>
              <tr>
                <th style={Object.assign({},H,{width:36,padding:"11px 8px"})}>#</th>
                {sheet.columns.map(function(col,ci){
                  return (
                    <th key={col.id} style={H}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:10,opacity:.45}}>{col.type==="status"?"🎯":col.type==="test"?"🧪":col.type==="checkbox"?"☑️":col.type==="url"?"🔗":col.comment?"💬":""}</span>
                        {editingHeader===col.id ? (
                          <input autoFocus value={col.name} onBlur={function(){setEditingHeader(null);}} onKeyDown={function(e){if(e.key==="Enter")setEditingHeader(null);}}
                            onChange={function(e){var v=e.target.value;onChange(Object.assign({},sheet,{columns:sheet.columns.map(function(c,i){return i===ci?Object.assign({},c,{name:v}):c;})}));}}
                            style={{border:"1px solid #3B82F6",borderRadius:4,padding:"2px 6px",fontSize:11,fontFamily:"inherit",fontWeight:700,color:"#fff",background:"#1E293B",width:100}}/>
                        ) : (
                          <span onDoubleClick={function(){setEditingHeader(col.id);}} style={{cursor:"default"}}>{col.name}</span>
                        )}
                        <div style={{display:"flex",gap:1,marginLeft:"auto"}}>
                          <button onClick={function(){setColModal({col:col,idx:ci,isNew:false});}} style={{border:"none",background:"none",cursor:"pointer",color:"#475569",fontSize:10,padding:"2px 4px",borderRadius:4,opacity:.5}} onMouseEnter={function(e){e.currentTarget.style.opacity=1;e.currentTarget.style.background="#334155";}} onMouseLeave={function(e){e.currentTarget.style.opacity=.5;e.currentTarget.style.background="none";}}>✏️</button>
                          <button onClick={function(){deleteCol(ci);}} style={{border:"none",background:"none",cursor:"pointer",color:"#475569",fontSize:10,padding:"2px 4px",borderRadius:4,opacity:.5}} onMouseEnter={function(e){e.currentTarget.style.opacity=1;e.currentTarget.style.background="#334155";}} onMouseLeave={function(e){e.currentTarget.style.opacity=.5;e.currentTarget.style.background="none";}}>🗑</button>
                        </div>
                      </div>
                    </th>
                  );
                })}
                <th style={Object.assign({},H,{width:44})}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(function(row,ri){
                return (
                  <tr key={row.id} className="row-hover"
                    onMouseEnter={function(){setHoveredRow(row.id);}} onMouseLeave={function(){setHoveredRow(null);}}
                    style={{background:ri%2===0?"#fff":"#FAFBFF",transition:"background .1s"}}>
                    <td style={Object.assign({},C,{textAlign:"center",padding:"9px 8px"})}>
                      <div className="row-num" onClick={function(){setDetailRow(row);}}
                        style={{width:24,height:24,borderRadius:6,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:11,fontWeight:700,color:"#64748B",margin:"0 auto",opacity:0,transition:"all .15s"}}
                        onMouseEnter={function(e){e.currentTarget.style.background="#EFF6FF";e.currentTarget.style.color="#1D4ED8";}}
                        onMouseLeave={function(e){e.currentTarget.style.background="#F1F5F9";e.currentTarget.style.color="#64748B";}}>
                        {ri+1}
                      </div>
                    </td>
                    {sheet.columns.map(function(col){
                      return (
                        <td key={col.id} style={Object.assign({},C,{textAlign:col.type==="checkbox"?"center":"left"})}>
                          {col.type==="test" ? <TestCell value={row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="status" ? <StatusCell value={row[col.id]} options={col.options} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="checkbox" ? <CheckCell value={!!row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="url" ? <UrlCell value={row[col.id]} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           col.type==="number" ? <input type="number" value={row[col.id]||""} onChange={function(e){updateRow(row.id,col.id,e.target.value);}} style={{border:"1px solid transparent",padding:"3px 6px",borderRadius:6,width:80,background:"transparent",fontFamily:"inherit",fontSize:13}}/> :
                           col.comment ? <CommentCell value={row[col.id]||""} onChange={function(v){updateRow(row.id,col.id,v);}}/> :
                           <input type="text" value={row[col.id]||""} onChange={function(e){updateRow(row.id,col.id,e.target.value);}}
                             style={{border:"1px solid transparent",padding:"4px 7px",borderRadius:7,width:"100%",minWidth:60,background:"transparent",fontFamily:"inherit",fontSize:13}}
                             onFocus={function(e){e.currentTarget.style.borderColor="#CBD5E1";}} onBlur={function(e){e.currentTarget.style.borderColor="transparent";}}/>}
                        </td>
                      );
                    })}
                    <td style={Object.assign({},C,{textAlign:"center",opacity:hoveredRow===row.id?1:0,transition:"opacity .15s"})}>
                      <button onClick={function(){deleteRow(row.id);}} style={{border:"none",background:"#FEE2E2",cursor:"pointer",color:"#EF4444",fontSize:11,padding:"4px 7px",borderRadius:6,fontWeight:700}}>✕</button>
                    </td>
                  </tr>
                );
              })}
              {filtered.length===0 && (
                <tr><td colSpan={sheet.columns.length+2} style={{padding:"40px",textAlign:"center",color:"#94A3B8",fontSize:14}}>
                  {search ? "Brak wyników dla: "+search : "Brak wierszy — kliknij „+ Dodaj wiersz""}
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div style={{padding:"12px 16px",background:"#F8FAFC",borderTop:"1px solid #F1F5F9",display:"flex",gap:10,alignItems:"center"}}>
          {[
            {label:"+ Dodaj wiersz",fn:addRow,hBg:"#EFF6FF",hBor:"#3B82F6",hCol:"#1D4ED8"},
            {label:"+ Dodaj kolumnę",fn:function(){setColModal({col:{name:"",type:"text"},isNew:true});},hBg:"#F0FDF4",hBor:"#10B981",hCol:"#065F46"},
          ].map(function(b){
            return (
              <button key={b.label} onClick={b.fn}
                style={{border:"1.5px dashed #CBD5E1",background:"transparent",color:"#94A3B8",padding:"6px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600,transition:"all .15s"}}
                onMouseEnter={function(e){e.currentTarget.style.background=b.hBg;e.currentTarget.style.borderColor=b.hBor;e.currentTarget.style.color=b.hCol;}}
                onMouseLeave={function(e){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="#CBD5E1";e.currentTarget.style.color="#94A3B8";}}>
                {b.label}
              </button>
            );
          })}
          {search && <span style={{marginLeft:"auto",color:"#64748B",fontSize:12}}>Znaleziono: <strong>{filtered.length}</strong> z {total}</span>}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  var [projects, setProjects] = useState(defaultProjects);
  var [activeProjId, setActiveProjId] = useState(defaultProjects[0].id);
  var [activeSheetId, setActiveSheetId] = useState(defaultProjects[0].sheets[0].id);
  var [loading, setLoading] = useState(true);
  var [saving, setSaving] = useState(false);
  var [lastSaved, setLastSaved] = useState(null);
  var [sidebarOpen, setSidebarOpen] = useState(true);
  var [editingTab, setEditingTab] = useState(null);
  var [newSheetMode, setNewSheetMode] = useState(false);
  var [newSheetName, setNewSheetName] = useState("");
  var [projModal, setProjModal] = useState(null);
  var saveDebounced = useRef(null);

  useEffect(function() {
    loadData().then(function(data) {
      setProjects(data);
      setActiveProjId(data[0].id);
      setActiveSheetId(data[0].sheets[0].id);
      setLoading(false);
    });
  }, []);

  useEffect(function() {
    if(loading) return;
    clearTimeout(saveDebounced.current);
    saveDebounced.current = setTimeout(function() {
      setSaving(true);
      saveData(projects).then(function() { setLastSaved(new Date()); setSaving(false); });
    }, 1500);
  }, [projects]);

  var activeProj = projects.find(function(p){return p.id===activeProjId;}) || projects[0];
  var activeSheet = activeProj && (activeProj.sheets.find(function(s){return s.id===activeSheetId;}) || activeProj.sheets[0]);

  var updateSheet = function(sheet) {
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:p.sheets.map(function(s){return s.id===sheet.id?sheet:s;})}):p;});});
  };
  var duplicateSheet = function(sheetId) {
    var src = activeProj.sheets.find(function(s){return s.id===sheetId;});
    if(!src) return;
    var copy = JSON.parse(JSON.stringify(src));
    copy.id = mkId(); copy.name = src.name+" (kopia)";
    copy.rows = copy.rows.map(function(r){return Object.assign({},r,{id:mkId()});});
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:[...p.sheets,copy]}):p;});});
    setActiveSheetId(copy.id);
  };
  var deleteSheet = function(sheetId) {
    if(activeProj.sheets.length<=1) return;
    var rest = activeProj.sheets.filter(function(s){return s.id!==sheetId;});
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:rest}):p;});});
    if(activeSheetId===sheetId) setActiveSheetId(rest[0].id);
  };
  var addSheet = function() {
    if(!newSheetName.trim()) return;
    var s = {id:mkId(),name:"📄 "+newSheetName.trim(),icon:"📄",
      columns:[{id:mkId(),name:"Nazwa",type:"text"},{id:mkId(),name:"Status",type:"status",options:STATUS_OPTS},{id:mkId(),name:"Testy",type:"test"}],rows:[]};
    setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:[...p.sheets,s]}):p;});});
    setActiveSheetId(s.id); setNewSheetName(""); setNewSheetMode(false);
  };
  var addProject = function(name,emoji,color) {
    var p = {id:mkId(),name:name,emoji:emoji,color:color,
      sheets:[mkChecklistSheet([])]};
    setProjects(function(ps){return [...ps,p];});
    setActiveProjId(p.id); setActiveSheetId(p.sheets[0].id);
  };
  var deleteProject = function(id) {
    if(projects.length<=1) return;
    var rest = projects.filter(function(p){return p.id!==id;});
    setProjects(rest);
    if(activeProjId===id){setActiveProjId(rest[0].id);setActiveSheetId(rest[0].sheets[0].id);}
  };

  var releaseSheet = activeProj && activeProj.sheets.find(function(s){return s.id==="sheet_release_tasks";});
  var releaseHealth = releaseSheet ? (function() {
    var t = releaseSheet.rows.length; if(!t) return 0;
    var be = releaseSheet.columns.find(function(c){return c.id==="col_be";});
    var fe = releaseSheet.columns.find(function(c){return c.id==="col_fe";});
    var tc = releaseSheet.columns.find(function(c){return c.id==="col_testy";});
    var score = 0;
    releaseSheet.rows.forEach(function(r){
      var pts=0;
      if(be&&r[be.id]==="Zakończone")pts++;
      if(fe&&r[fe.id]==="Zakończone")pts++;
      if(tc&&r[tc.id]&&r[tc.id].state==="pass")pts++;
      score+=pts/3;
    });
    return Math.round(score/t*100);
  })() : 0;
  var hColor = releaseHealth>70?"#34D399":releaseHealth>40?"#FCD34D":"#F87171";

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{fontSize:48,animation:"spin 1.5s linear infinite"}}>⚙️</div>
      <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Wczytywanie z Google Sheets…</div>
      <div style={{color:"#64748B",fontSize:13}}>Synchronizacja danych z chmurą</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:"'Segoe UI',system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      {projModal && <ProjectModal initial={projModal} onSave={function(n,e,c){
        if(projModal.id){
          setProjects(function(ps){return ps.map(function(p){return p.id===projModal.id?Object.assign({},p,{name:n,emoji:e,color:c}):p;});});
        } else { addProject(n,e,c); }
        setProjModal(null);
      }} onClose={function(){setProjModal(null);}}/>}

      {/* TOPBAR */}
      <div style={{background:"linear-gradient(135deg,#0F172A,#1E293B)",boxShadow:"0 4px 24px rgba(0,0,0,.35)",position:"sticky",top:0,zIndex:100,flexShrink:0}}>
        <div style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #1E293B"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={function(){setSidebarOpen(function(o){return !o;});}} style={{border:"none",background:"rgba(255,255,255,.06)",color:"#94A3B8",width:34,height:34,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}
              onMouseEnter={function(e){e.currentTarget.style.background="rgba(255,255,255,.1)";}} onMouseLeave={function(e){e.currentTarget.style.background="rgba(255,255,255,.06)";}}>
              ☰
            </button>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,"+activeProj.color+","+activeProj.color+"aa"+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {activeProj.emoji}
            </div>
            <div>
              <div style={{color:"#fff",fontWeight:900,fontSize:15,letterSpacing:"-.3px"}}>{activeProj.name}</div>
              <div style={{color:"#475569",fontSize:11,display:"flex",alignItems:"center",gap:6}}>
                Release Tracker
                {saving && <span style={{background:"#1E293B",color:"#60A5FA",fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:600,animation:"pulse 1s infinite"}}>⏳ Zapis…</span>}
                {!saving && lastSaved && <span style={{background:"#1E293B",color:"#34D399",fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:600}}>✓ {lastSaved.toLocaleTimeString("pl")}</span>}
              </div>
            </div>
          </div>
          {releaseSheet && (
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div>
                <div style={{color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4,textAlign:"right"}}>Release Health</div>
                <div style={{width:140,height:5,background:"#1E293B",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:releaseHealth+"%",background:hColor,borderRadius:99,transition:"width .8s"}}/>
                </div>
              </div>
              <div style={{fontSize:22,fontWeight:900,color:hColor,letterSpacing:"-1.5px"}}>{releaseHealth}%</div>
            </div>
          )}
        </div>
        {/* TABS */}
        <div style={{padding:"0 16px",display:"flex",alignItems:"stretch",overflowX:"auto",gap:2}}>
          {activeProj.sheets.map(function(s){
            var isA = activeSheetId===s.id;
            return (
              <div key={s.id} className="tab-item" onClick={function(){setActiveSheetId(s.id);}}
                style={{display:"flex",alignItems:"center",gap:6,padding:"0 10px",cursor:"pointer",flexShrink:0,
                  borderBottom:isA?"3px solid #60A5FA":"3px solid transparent",
                  background:isA?"rgba(96,165,250,.08)":"transparent"}}>
                <span style={{fontSize:12}}>{s.icon||"📄"}</span>
                {editingTab===s.id ? (
                  <input autoFocus value={s.name.replace(/^\S+\s/,"")} onBlur={function(){setEditingTab(null);}} onKeyDown={function(e){if(e.key==="Enter")setEditingTab(null);}}
                    onChange={function(e){var v=e.target.value;setProjects(function(ps){return ps.map(function(p){return p.id===activeProjId?Object.assign({},p,{sheets:p.sheets.map(function(x){return x.id===s.id?Object.assign({},x,{name:(s.icon||"📄")+" "+v}):x;})}):p;});});}}
                    style={{border:"1px solid #60A5FA",background:"transparent",color:"#fff",fontSize:12,fontFamily:"inherit",borderRadius:4,padding:"2px 6px",width:120}}/>
                ) : (
                  <span onDoubleClick={function(){setEditingTab(s.id);}}
                    style={{color:isA?"#F8FAFC":"#94A3B8",fontSize:12,fontWeight:isA?700:500,padding:"14px 0",whiteSpace:"nowrap"}}>
                    {s.name.replace(/^\S+\s/,"")}
                  </span>
                )}
                <button onClick={function(e){e.stopPropagation();duplicateSheet(s.id);}} title="Duplikuj arkusz"
                  style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:11,padding:"1px 3px",borderRadius:3,opacity:.5,marginLeft:2}}
                  onMouseEnter={function(e){e.currentTarget.style.color="#60A5FA";e.currentTarget.style.opacity=1;e.currentTarget.style.background="#1E293B";}}
                  onMouseLeave={function(e){e.currentTarget.style.color="#334155";e.currentTarget.style.opacity=.5;e.currentTarget.style.background="none";}}>⧉</button>
                {activeProj.sheets.length>1 && (
                  <button onClick={function(e){e.stopPropagation();deleteSheet(s.id);}}
                    style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:11,padding:"1px 4px",borderRadius:4,opacity:.5}}
                    onMouseEnter={function(e){e.currentTarget.style.color="#F87171";e.currentTarget.style.opacity=1;}}
                    onMouseLeave={function(e){e.currentTarget.style.color="#334155";e.currentTarget.style.opacity=.5;}}>✕</button>
                )}
              </div>
            );
          })}
          {newSheetMode ? (
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px"}}>
              <input autoFocus value={newSheetName} onChange={function(e){setNewSheetName(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter")addSheet();if(e.key==="Escape")setNewSheetMode(false);}}
                placeholder="Nazwa…" style={{border:"1px solid #60A5FA",background:"rgba(255,255,255,.08)",color:"#fff",fontSize:12,borderRadius:8,padding:"4px 10px",fontFamily:"inherit",width:150}}/>
              <button onClick={addSheet} style={{border:"none",background:"#10B981",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>✓</button>
              <button onClick={function(){setNewSheetMode(false);}} style={{border:"none",background:"#475569",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          ) : (
            <button onClick={function(){setNewSheetMode(true);}}
              style={{border:"none",background:"transparent",color:"#475569",cursor:"pointer",fontSize:22,padding:"0 12px",fontWeight:300,lineHeight:1,transition:"color .15s"}}
              onMouseEnter={function(e){e.currentTarget.style.color="#60A5FA";}} onMouseLeave={function(e){e.currentTarget.style.color="#475569";}}>+</button>
          )}
        </div>
      </div>

      {/* BODY */}
      <div style={{display:"flex",flex:1,minHeight:0}}>
        {/* SIDEBAR */}
        {sidebarOpen && (
          <div style={{width:230,background:"#0F172A",flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid #1E293B",animation:"slideLeft .2s ease"}}>
            <div style={{padding:"16px 14px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:11,fontWeight:800,color:"#475569",textTransform:"uppercase",letterSpacing:".08em"}}>Projekty</span>
              <button onClick={function(){setProjModal({});}} title="Nowy projekt"
                style={{border:"none",background:"rgba(96,165,250,.1)",color:"#60A5FA",width:26,height:26,borderRadius:6,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:300}}
                onMouseEnter={function(e){e.currentTarget.style.background="rgba(96,165,250,.2)";}} onMouseLeave={function(e){e.currentTarget.style.background="rgba(96,165,250,.1)";}}>+</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"0 8px 16px"}}>
              {projects.map(function(p){
                var isActive = p.id===activeProjId;
                var totalRows = p.sheets.reduce(function(sum,s){return sum+s.rows.length;},0);
                return (
                  <div key={p.id} className="proj-item" onClick={function(){setActiveProjId(p.id);setActiveSheetId(p.sheets[0].id);}}
                    style={{padding:"10px 12px",borderRadius:10,cursor:"pointer",marginBottom:4,
                      background:isActive?"rgba(96,165,250,.12)":"transparent",
                      border:"1px solid "+(isActive?"rgba(96,165,250,.25)":"transparent"),
                      transition:"all .15s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:32,height:32,borderRadius:8,background:p.color+"22",border:"1.5px solid "+p.color+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                        {p.emoji}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:isActive?"#F8FAFC":"#CBD5E1",fontWeight:isActive?700:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                        <div style={{color:"#475569",fontSize:10,marginTop:2}}>{p.sheets.length} arkuszy · {totalRows} wierszy</div>
                      </div>
                      <div style={{display:"flex",gap:2,flexShrink:0}}>
                        <button onClick={function(e){e.stopPropagation();setProjModal(p);}} style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:10,padding:"2px",borderRadius:3,opacity:.5}}
                          onMouseEnter={function(e){e.currentTarget.style.opacity=1;e.currentTarget.style.color="#60A5FA";}} onMouseLeave={function(e){e.currentTarget.style.opacity=.5;e.currentTarget.style.color="#334155";}}>✏️</button>
                        {projects.length>1 && <button onClick={function(e){e.stopPropagation();deleteProject(p.id);}} style={{border:"none",background:"none",color:"#334155",cursor:"pointer",fontSize:10,padding:"2px",borderRadius:3,opacity:.5}}
                          onMouseEnter={function(e){e.currentTarget.style.opacity=1;e.currentTarget.style.color="#F87171";}} onMouseLeave={function(e){e.currentTarget.style.opacity=.5;e.currentTarget.style.color="#334155";}}>🗑</button>}
                      </div>
                    </div>
                    {isActive && (
                      <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.06)"}}>
                        {p.sheets.map(function(s){
                          return (
                            <div key={s.id} onClick={function(e){e.stopPropagation();setActiveSheetId(s.id);}}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"4px 6px",borderRadius:6,cursor:"pointer",marginBottom:2,
                                background:activeSheetId===s.id?"rgba(96,165,250,.15)":"transparent"}}
                              onMouseEnter={function(e){if(activeSheetId!==s.id)e.currentTarget.style.background="rgba(255,255,255,.04)";}}
                              onMouseLeave={function(e){if(activeSheetId!==s.id)e.currentTarget.style.background="transparent";}}>
                              <span style={{fontSize:11}}>{s.icon||"📄"}</span>
                              <span style={{fontSize:12,color:activeSheetId===s.id?"#93C5FD":"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name.replace(/^\S+\s/,"")}</span>
                              <span style={{marginLeft:"auto",fontSize:10,color:"#334155",flexShrink:0}}>{s.rows.length}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* MAIN CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
          {activeSheet && (
            <div key={activeSheet.id} style={{animation:"slideIn .2s ease"}}>
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:22,fontWeight:900,color:"#0F172A",letterSpacing:"-.5px",margin:0}}>{activeSheet.name}</h1>
                <p style={{color:"#94A3B8",fontSize:12,margin:"5px 0 0"}}>
                  💡 Kliknij numer wiersza → panel szczegółów · 📋 Import (wklej/plik) · 📥 Eksport do Excel/Sheets · ⧉ duplikuj zakładkę
                </p>
              </div>
              <SheetView sheet={activeSheet} onChange={updateSheet}/>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────────────
function ProjectModal({initial, onSave, onClose}) {
  var isEdit = !!(initial && initial.id);
  var [name, setName] = useState(initial&&initial.name?initial.name.replace(/^\S+\s/,""):"");
  var [emoji, setEmoji] = useState((initial&&initial.emoji)||"🚀");
  var [color, setColor] = useState((initial&&initial.color)||"#3B82F6");
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.7)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}
      onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:20,padding:32,width:420,maxWidth:"calc(100vw - 32px)",boxShadow:"0 30px 80px rgba(0,0,0,.3)",animation:"popIn .2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h3 style={{fontSize:20,fontWeight:800,color:"#0F172A"}}>{isEdit?"✏️ Edytuj projekt":"🆕 Nowy projekt"}</h3>
          <button onClick={onClose} style={{border:"none",background:"#F1F5F9",fontSize:16,cursor:"pointer",color:"#64748B",width:32,height:32,borderRadius:8}}>✕</button>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Nazwa projektu</label>
          <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="np. E-commerce, HC PROD, CRM…"
            style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 14px",fontSize:14,fontFamily:"inherit"}}
            onFocus={function(e){e.currentTarget.style.borderColor="#3B82F6";}} onBlur={function(e){e.currentTarget.style.borderColor="#E2E8F0";}}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Emoji</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {PROJECT_EMOJIS.map(function(e){
              return <div key={e} onClick={function(){setEmoji(e);}} style={{width:36,height:36,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,border:"2px solid "+(emoji===e?"#3B82F6":"#E2E8F0"),background:emoji===e?"#EFF6FF":"#F8FAFC"}}>{e}</div>;
            })}
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Kolor</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {PROJECT_COLORS.map(function(c){
              return <div key={c} onClick={function(){setColor(c);}} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:"3px solid "+(color===c?"#0F172A":"transparent"),transform:color===c?"scale(1.2)":"scale(1)",transition:"transform .15s"}}/>;
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{border:"1.5px solid #E2E8F0",background:"transparent",color:"#64748B",padding:"10px 22px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:600}}>Anuluj</button>
          <button onClick={function(){if(name.trim())onSave(name.trim(),emoji,color);}} style={{border:"none",background:"linear-gradient(135deg,#1E293B,#0F172A)",color:"#fff",padding:"10px 22px",borderRadius:10,cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:700}}>{isEdit?"Zapisz":"Utwórz projekt"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
